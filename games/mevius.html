function drawXiThruster(sx, sy, frame) {
  const flicker = 0.82 + Math.sin(frame * 0.45) * 0.12;
  const len = (18 + Math.sin(frame * 0.7) * 5) * sy * flicker;
  const halfW = 4.5 * sx;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const grad = ctx.createRadialGradient(0, 14 * sy, 0, 0, 14 * sy + len * 0.5, len);
  grad.addColorStop(0, "rgba(220, 245, 255, 0.95)");
  grad.addColorStop(0.25, "rgba(120, 210, 255, 0.75)");
  grad.addColorStop(0.55, "rgba(60, 140, 255, 0.45)");
  grad.addColorStop(1, "rgba(30, 80, 255, 0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-halfW, 14 * sy);
  ctx.quadraticCurveTo(-halfW * 1.8, 14 * sy + len * 0.45, 0, 14 * sy + len);
  ctx.quadraticCurveTo(halfW * 1.8, 14 * sy + len * 0.45, halfW, 14 * sy);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawXiGundam(x, y, w, h, bank, frame) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  const sx = w / 48;
  const sy = h / 52;
  const transformGlow = player.xiTransformFrame < 24
    ? 1 + (24 - player.xiTransformFrame) / 24 * 0.35
    : 1;

  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + h * 0.38, w * 0.55, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.translate(cx, cy);
  ctx.rotate(bank * 0.5);
  ctx.scale(transformGlow, transformGlow);

  drawXiThruster(sx, sy, frame);

  const armorStroke = "rgba(35, 45, 58, 0.92)";
  const panelStroke = "rgba(250, 255, 255, 0.52)";
  const shadow = "#5e6870";
  const mid = "#aeb8bd";
  const light = "#edf2f3";
  const dark = "#17233d";
  const red = "#8e2726";
  const gold = "#e1b640";
  const sensor = "#42f3d3";
  const poly = (pts, fill, stroke = armorStroke, line = 1.1) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    pts.forEach(([px, py], i) => {
      const xx = px * sx;
      const yy = py * sy;
      if (i === 0) ctx.moveTo(xx, yy);
      else ctx.lineTo(xx, yy);
    });
    ctx.closePath();
    ctx.fill();
    if (stroke) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = Math.max(0.65, line * sx);
      ctx.stroke();
    }
  };
  const mirror = pts => pts.map(([px, py]) => [-px, py]);
  const both = (pts, fill, stroke, line) => {
    poly(pts, fill, stroke, line);
    poly(mirror(pts), fill, stroke, line);
  };

  ctx.shadowColor = "rgba(130, 210, 255, 0.35)";
  ctx.shadowBlur = 8 * transformGlow;

  both([[6, -17], [13, -24], [18, -15], [15, -4], [8, -2], [5, -10]], dark);
  both([[12, -7], [25, -18], [22, 3], [15, 13], [9, 6]], "#dce2e4");
  both([[16, -4], [30, -10], [23, 8], [14, 10]], light);
  both([[21, -1], [28, 3], [22, 8], [17, 7]], mid);
  both([[18, -15], [22, -20], [24, -4], [20, 0]], "#7c868b");

  both([[7, 4], [15, 11], [10, 24], [4, 19], [3, 9]], "#d9dee0");
  both([[11, 13], [18, 22], [12, 25], [8, 20]], shadow);
  both([[18, 4], [26, 9], [22, 16], [16, 13]], light);
  both([[25, 8], [31, 11], [28, 14], [24, 13]], "#cfd6d9");
  both([[27, 10], [33, 10], [31, 13], [27, 13]], "#b9c2c6");

  both([[5, 12], [9, 24], [3, 27], [1, 16]], dark);
  both([[2, 17], [5, 26], [1, 29], [0, 18]], "#293553");

  poly([[-7, 7], [-5, 20], [-2, 25], [2, 25], [5, 20], [7, 7], [4, 4], [-4, 4]], "#1b2948");
  both([[2, 14], [5, 26], [1, 27], [0.5, 15]], "#313d61");

  poly([[-7, -2], [-9, 10], [-3, 14], [3, 14], [9, 10], [7, -2], [4, -5], [-4, -5]], light);
  both([[4, -4], [9, -1], [6, 9], [1, 11]], "#cfd6d9");
  poly([[-5, -1], [0, -4], [5, -1], [2, 6], [-2, 6]], gold);
  poly([[-2.4, 2], [2.4, 2], [2, 5], [-2, 5]], red, "rgba(60, 20, 20, 0.95)");

  poly([[-6, -12], [6, -12], [7, -5], [3, -2], [-3, -2], [-7, -5]], "#f2f5f6");
  both([[2, -12], [7, -16], [8, -7], [4, -4]], mid);
  both([[1, -18], [4, -26], [3, -12], [0, -9]], gold, "rgba(100, 78, 16, 0.9)");
  poly([[-2.2, -10], [2.2, -10], [1.8, -7.5], [-1.8, -7.5]], red, "rgba(50, 18, 18, 0.9)");

  ctx.fillStyle = sensor;
  ctx.shadowColor = "rgba(66, 243, 211, 0.9)";
  ctx.shadowBlur = 6;
  ctx.fillRect(-3.8 * sx, -7.2 * sy, 2.4 * sx, 1.6 * sy);
  ctx.fillRect(1.4 * sx, -7.2 * sy, 2.4 * sx, 1.6 * sy);

  ctx.shadowBlur = 0;
  ctx.strokeStyle = panelStroke;
  ctx.lineWidth = Math.max(0.7, 0.9 * sx);
  ctx.beginPath();
  ctx.moveTo(-24 * sx, -7 * sy);
  ctx.lineTo(-15 * sx, -1 * sy);
  ctx.lineTo(-21 * sx, 7 * sy);
  ctx.moveTo(24 * sx, -7 * sy);
  ctx.lineTo(15 * sx, -1 * sy);
  ctx.lineTo(21 * sx, 7 * sy);
  ctx.moveTo(-6 * sx, -1 * sy);
  ctx.lineTo(0, 3 * sy);
  ctx.lineTo(6 * sx, -1 * sy);
  ctx.stroke();

  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = "rgba(80, 245, 220, 0.18)";
  ctx.beginPath();
  ctx.ellipse(0, -3 * sy, 7 * sx, 12 * sy, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawXiBarrier(x, y, w, h, layers, flash) {
  if (layers <= 0) return;
  const cx = x + w / 2;
  const cy = y + h / 2;
  const pulse = 0.85 + Math.sin(performance.now() * 0.01) * 0.15;
  const flashBoost = flash > 0 ? flash / 20 : 0;
  const radius = Math.max(w, h) * 0.62 + layers * 1.8;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalCompositeOperation = "lighter";

  for (let ring = 0; ring < 3; ring++) {
    const rr = radius + ring * 6;
    const alpha = (0.22 - ring * 0.05) * pulse + flashBoost * 0.2;
    ctx.strokeStyle = `rgba(140, 220, 255, ${alpha})`;
    ctx.lineWidth = 2.2 - ring * 0.4;
    ctx.beginPath();
    ctx.ellipse(0, 0, rr * 1.08, rr * 0.92, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  const hexCount = 12;
  for (let i = 0; i < hexCount; i++) {
    const ang = i * Math.PI * 2 / hexCount + performance.now() * 0.001;
    const hx = Math.cos(ang) * radius * 0.92;
    const hy = Math.sin(ang) * radius * 0.78;
    const alpha = 0.12 * pulse + flashBoost * 0.15;
    ctx.strokeStyle = `rgba(190, 240, 255, ${alpha})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let v = 0; v < 6; v++) {
      const va = ang + v * Math.PI / 3;
      const px = hx + Math.cos(va) * 5;
      const py = hy + Math.sin(va) * 4;
      if (v === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
  }

  ctx.fillStyle = `rgba(120, 210, 255, ${0.06 + flashBoost * 0.1})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, radius * 1.05, radius * 0.88, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawAirEnemy(e) {
  const cx = e.x + e.w / 2;
  const cy = e.y + e.h / 2;

  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.24)";
  ctx.beginPath();
  ctx.ellipse(cx + 14, e.y + e.h + 24, e.w * 0.7, e.h * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = e.kind === "large" ? "#ffd66b" : "#8affff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.max(e.w, e.h) * 0.75, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = e.kind === "large" ? "#ff355d" : "#35f4ff";
  if (e.kind === "large") {
    ctx.beginPath();
    ctx.moveTo(cx, e.y + e.h + 3);
    ctx.lineTo(e.x + e.w, e.y + 7);
    ctx.lineTo(e.x + e.w * 0.62, e.y + 2);
    ctx.lineTo(cx, e.y - 4);
    ctx.lineTo(e.x + e.w * 0.38, e.y + 2);
    ctx.lineTo(e.x, e.y + 7);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#fff1a8";
    ctx.fillRect(cx - 3, e.y + 6, 6, e.h * 0.6);
  } else {
    ctx.beginPath();
    ctx.moveTo(cx, e.y + e.h + 2);
    ctx.lineTo(e.x + e.w, e.y + 5);
    ctx.lineTo(cx, e.y - 3);
    ctx.lineTo(e.x, e.y + 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#eaffff";
    ctx.fillRect(cx - 2, e.y + 5, 4, e.h * 0.55);
  }

  ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
  ctx.font = "9px monospace";
  ctx.textAlign = "center";
  ctx.fillText("AIR", cx, e.y - 9);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawGroundTarget(g, sy) {
  if (sy < -g.h || sy > H) return;
  const cx = g.x + g.w / 2;
  const baseY = sy + g.h;

  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.46)";
  ctx.beginPath();
  ctx.ellipse(cx + 5, baseY + 5, g.w * 0.72, g.h * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(255, 229, 112, 0.75)";
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.ellipse(cx, baseY - 2, g.w * 0.65, g.h * 0.45, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  if (g.type === "giantFortress") {
    ctx.fillStyle = "#211711";
    roundRect(g.x, sy + g.h * 0.28, g.w, g.h * 0.72, 8);
    ctx.fill();
    ctx.fillStyle = "#5b3d25";
    roundRect(g.x + 8, sy + 8, g.w - 16, g.h * 0.56, 6);
    ctx.fill();
    ctx.fillStyle = "#c89554";
    roundRect(g.x + g.w * 0.34, sy, g.w * 0.32, g.h * 0.46, 5);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + 9, sy + g.h * 0.54, g.w - 18, 4);
    ctx.fillRect(g.x + g.w * 0.18, sy + g.h * 0.18, 18, 5);
    ctx.fillRect(g.x + g.w * 0.64, sy + g.h * 0.18, 18, 5);
    ctx.fillStyle = "#100b08";
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(g.x + 16 + i * 15, sy + g.h * 0.62, 8, 8);
    }
  } else if (g.type === "smallFortress") {
    ctx.fillStyle = "#302017";
    roundRect(g.x, sy + g.h * 0.26, g.w, g.h * 0.74, 6);
    ctx.fill();
    ctx.fillStyle = "#8c6236";
    roundRect(g.x + 5, sy + 5, g.w - 10, g.h * 0.55, 5);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + 7, sy + g.h * 0.48, g.w - 14, 3);
    ctx.fillStyle = "#1a110c";
    ctx.fillRect(g.x + g.w * 0.18, sy + g.h * 0.62, 8, 7);
    ctx.fillRect(g.x + g.w * 0.62, sy + g.h * 0.62, 8, 7);
  } else if (g.type === "pillbox") {
    ctx.fillStyle = "#4a321f";
    roundRect(g.x, sy + g.h * 0.38, g.w, g.h * 0.62, 5);
    ctx.fill();
    ctx.fillStyle = "#b8874b";
    ctx.beginPath();
    ctx.arc(g.x + g.w / 2, sy + g.h * 0.38, g.w * 0.5, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = "#21150d";
    ctx.fillRect(g.x + g.w * 0.22, sy + g.h * 0.48, g.w * 0.56, g.h * 0.18);
  } else if (g.type === "aaGun") {
    ctx.fillStyle = "#2d2a23";
    roundRect(g.x + g.w * 0.12, sy + g.h * 0.54, g.w * 0.76, g.h * 0.42, 4);
    ctx.fill();
    ctx.fillStyle = "#79856a";
    ctx.beginPath();
    ctx.arc(cx, sy + g.h * 0.55, g.w * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#ffe570";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx, sy + g.h * 0.48);
    ctx.lineTo(cx + g.w * 0.32, sy + g.h * 0.1);
    ctx.stroke();
    ctx.fillStyle = "#ffed8a";
    ctx.beginPath();
    ctx.arc(cx + g.w * 0.35, sy + g.h * 0.07, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (g.type === "tank") {
    ctx.fillStyle = "#25351f";
    roundRect(g.x, sy + g.h * 0.42, g.w, g.h * 0.62, 3);
    ctx.fill();
    ctx.fillStyle = "#79a942";
    roundRect(g.x + g.w * 0.12, sy + g.h * 0.1, g.w * 0.55, g.h * 0.52, 4);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + g.w * 0.63, sy + g.h * 0.38, g.w * 0.48, 3);
  }

  ctx.fillStyle = "rgba(255, 229, 112, 0.9)";
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  ctx.fillText("GROUND", cx, baseY + 18);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawExplosion() {
  if (!explosion) return;
  const t = explosion.frame / explosion.duration;
  ctx.save();
  ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
  ctx.fillStyle = "#ff0";
  ctx.beginPath();
  ctx.arc(explosion.cx, explosion.cy, 6 + t * 30, 0, Math.PI * 2);
  ctx.fill();
  for (const p of explosion.particles) {
    ctx.globalAlpha = Math.max(0, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.restore();
}

function drawBursts() {
  for (const p of burstParticles) {
    ctx.globalAlpha = Math.max(0, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawLivesHUD() {
  const iconW = 14;
  const iconH = 10;
  const gap = 5;
  const padding = 10;
  const y = 10;
  const totalW = lives > 0 ? lives * iconW + (lives - 1) * gap : 0;
  const startX = W - padding - totalW;
  ctx.fillStyle = "#8ab4d4";
  ctx.font = "11px monospace";
  ctx.textAlign = "right";
  ctx.fillText("LIVES", W - padding, y - 2);
  ctx.textAlign = "left";
  for (let i = 0; i < lives; i++) {
    drawPlayer(startX + i * (iconW + gap), y, iconW, iconH);
  }
}

function drawAirBullet(b) {
  ctx.fillStyle = "#f88";
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

function drawGroundShell(b) {
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  const angle = Math.atan2(b.vy, b.vx);
  const speed = Math.hypot(b.vx, b.vy) || 1;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  for (let i = 1; i <= 5; i++) {
    const alpha = 0.42 - i * 0.07;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = i < 3 ? "rgba(255, 170, 60, 0.55)" : "rgba(140, 140, 140, 0.45)";
    ctx.beginPath();
    ctx.ellipse(-i * (5 + speed), 0, 5 + i * 1.2, 3.5 + i * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.shadowColor = "rgba(255, 120, 40, 0.85)";
  ctx.shadowBlur = 12;

  const body = ctx.createLinearGradient(-8, 0, 10, 0);
  body.addColorStop(0, "#8b4513");
  body.addColorStop(0.35, "#d4a017");
  body.addColorStop(0.65, "#f0d060");
  body.addColorStop(1, "#7a4a12");
  ctx.fillStyle = body;
  roundRect(-8, -6, 14, 12, 3);
  ctx.fill();

  ctx.shadowBlur = 0;

  ctx.fillStyle = "#2a2a2a";
  ctx.beginPath();
  ctx.moveTo(6, -5);
  ctx.lineTo(16, 0);
  ctx.lineTo(6, 5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#c45c26";
  ctx.fillRect(-10, -4, 4, 8);

  ctx.strokeStyle = "rgba(255, 240, 180, 0.7)";
  ctx.lineWidth = 1.2;
  roundRect(-8, -6, 14, 12, 3);
  ctx.stroke();

  ctx.restore();
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    if (b.kind === "ground") drawGroundShell(b);
    else drawAirBullet(b);
  }
}

function buildStarPath(outerR, innerR) {
  const path = new Path2D();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    if (i === 0) path.moveTo(px, py);
    else path.lineTo(px, py);
  }
  path.closePath();
  return path;
}

function drawInvincibleStarGraphic(scale, rotation, pulse) {
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 18 * scale);
  glow.addColorStop(0, `rgba(255, 255, 220, ${0.95 * pulse})`);
  glow.addColorStop(0.45, `rgba(255, 220, 60, ${0.65 * pulse})`);
  glow.addColorStop(1, "rgba(255, 160, 0, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 18 * scale, 0, Math.PI * 2);
  ctx.fill();

  ctx.rotate(rotation);
  const star = buildStarPath(12 * scale, 5 * scale);
  ctx.fillStyle = "#ffe570";
  ctx.fill(star);
  ctx.strokeStyle = "#fff8c0";
  ctx.lineWidth = 1.5;
  ctx.stroke(star);
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(0, 0, 2.5 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawInvincibleAura(x, y, w, h, timer) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  const pulse = 0.8 + Math.sin(performance.now() * 0.012) * 0.2;
  const rotation = performance.now() * 0.004;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalCompositeOperation = "lighter";

  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.rotate(rotation + i * Math.PI * 2 / 3);
    drawInvincibleStarGraphic(0.85 + i * 0.18, 0, pulse * (0.55 - i * 0.12));
    ctx.restore();
  }

  ctx.strokeStyle = `rgba(255, 240, 120, ${0.35 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(w, h) * 0.62, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawRadBeamItemIcon(level, pulse, timer) {
  const color = RAD_ITEM_COLORS[level - 1];

  if (level >= 4) {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(255, 220, 140, ${0.95 * pulse})`);
    glow.addColorStop(0.45, `rgba(255, 140, 40, ${0.55 * pulse})`);
    glow.addColorStop(1, "rgba(180, 60, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 5);
    ctx.lineTo(0, -11);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255, 240, 210, ${0.95 * pulse})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 5);
    ctx.lineTo(0, -11);
    ctx.stroke();
    ctx.fillStyle = "#fff4d0";
    ctx.beginPath();
    ctx.arc(0, 4, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("R" + level, 0, 16);
    return;
  }

  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
  glow.addColorStop(0, `rgba(180, 255, 180, ${0.95 * pulse})`);
  glow.addColorStop(0.45, `rgba(80, 255, 80, ${0.55 * pulse})`);
  glow.addColorStop(1, "rgba(40, 180, 40, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < level; i++) {
    const ang = -Math.PI / 2 + (i - (level - 1) / 2) * 0.45 + Math.sin(timer * 0.08) * 0.12;
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang) * 3, Math.sin(ang) * 3);
    ctx.lineTo(Math.cos(ang) * (10 + level), Math.sin(ang) * (10 + level));
    ctx.stroke();
  }

  ctx.fillStyle = level >= 4 ? "#efe" : "#cfc";
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  ctx.fillText("R" + level, 0, 16);
}

function drawFunnelMissileItemIcon(level, pulse, timer) {
  const color = FUNNEL_ITEM_COLORS[level - 1];
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
  glow.addColorStop(0, `rgba(255, 180, 160, ${0.95 * pulse})`);
  glow.addColorStop(0.45, `rgba(255, 90, 90, ${0.55 * pulse})`);
  glow.addColorStop(1, "rgba(255, 40, 40, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.rotate(Math.sin(timer * 0.08) * 0.35);
  for (let i = 0; i < level; i++) {
    const offset = (i - (level - 1) / 2) * 5;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(offset, -10);
    ctx.lineTo(offset + 3, 6);
    ctx.lineTo(offset, 3);
    ctx.lineTo(offset - 3, 6);
    ctx.closePath();
    ctx.fill();
  }
  ctx.strokeStyle = "rgba(255, 200, 120, 0.75)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, 4);
  ctx.quadraticCurveTo(-14, 0, -10, -4);
  ctx.moveTo(10, 4);
  ctx.quadraticCurveTo(14, 0, 10, -4);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = level >= 4 ? "#fff8c0" : "#ffd0c0";
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  ctx.fillText("F" + level, 0, 16);
}

function drawPowerUp(item) {
  const bob = Math.sin(item.timer * 0.1 + item.bob) * 3;
  const cx = item.x + item.w / 2;
  const cy = item.y + item.h / 2 + bob;
  const pulse = 0.75 + Math.sin(item.timer * 0.14) * 0.25;

  ctx.save();
  ctx.translate(cx, cy);

  if (isRadBeamItem(item.type)) {
    drawRadBeamItemIcon(getRadBeamLevelFromItem(item.type), pulse, item.timer);
  } else if (item.type === "flame") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(255, 240, 180, ${0.95 * pulse})`);
    glow.addColorStop(0.4, `rgba(255, 120, 30, ${0.65 * pulse})`);
    glow.addColorStop(1, "rgba(255, 40, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f80";
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(8, -2, 6, 8);
    ctx.quadraticCurveTo(0, 4, -6, 8);
    ctx.quadraticCurveTo(-8, -2, 0, -10);
    ctx.fill();
    ctx.fillStyle = "#ff0";
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(4, 0, 0, 5);
    ctx.quadraticCurveTo(-4, 0, 0, -6);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("FLM", 0, 14);
  } else if (isFunnelMissileItem(item.type)) {
    drawFunnelMissileItemIcon(getFunnelMissileLevelFromItem(item.type), pulse, item.timer);
  } else if (item.type === "invincibleStar") {
    drawInvincibleStarGraphic(1, item.timer * 0.06, pulse);
    ctx.fillStyle = "#fff8c0";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("STR", 0, 16);
  } else if (item.type === "wildfire") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(255, 220, 120, ${0.95 * pulse})`);
    glow.addColorStop(0.4, `rgba(255, 80, 10, ${0.7 * pulse})`);
    glow.addColorStop(1, "rgba(120, 20, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#ff0";
    ctx.lineWidth = 2;
    for (let r = 0; r < 8; r++) {
      const ang = r * Math.PI / 4 + item.timer * 0.04;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * 4, Math.sin(ang) * 4);
      ctx.lineTo(Math.cos(ang) * 12, Math.sin(ang) * 12);
      ctx.stroke();
    }

    ctx.fillStyle = "#f80";
    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.quadraticCurveTo(7, 0, 5, 9);
    ctx.quadraticCurveTo(0, 5, -5, 9);
    ctx.quadraticCurveTo(-7, 0, 0, -8);
    ctx.fill();
    ctx.fillStyle = "#ff0";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("WFR", 0, 15);
  } else if (item.type === "xi") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
    glow.addColorStop(0, `rgba(255, 255, 255, ${0.95 * pulse})`);
    glow.addColorStop(0.35, `rgba(180, 220, 255, ${0.65 * pulse})`);
    glow.addColorStop(0.7, `rgba(255, 208, 64, ${0.35 * pulse})`);
    glow.addColorStop(1, "rgba(89, 215, 255, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#e8eaef";
    ctx.beginPath();
    ctx.moveTo(0, -9);
    ctx.lineTo(-8, 2);
    ctx.lineTo(-4, 6);
    ctx.lineTo(0, 3);
    ctx.lineTo(4, 6);
    ctx.lineTo(8, 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ffd040";
    ctx.beginPath();
    ctx.moveTo(0, -9);
    ctx.lineTo(2, -4);
    ctx.lineTo(0, -2);
    ctx.lineTo(-2, -4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#1a2848";
    ctx.fillRect(-2, 4, 4, 3);
    ctx.fillStyle = "#40ff80";
    ctx.fillRect(-2.5, -3, 2, 1.2);
    ctx.fillRect(0.5, -3, 2, 1.2);

    ctx.strokeStyle = `rgba(89, 215, 255, ${0.75 * pulse})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-10, -1);
    ctx.lineTo(-14, -6);
    ctx.moveTo(10, -1);
    ctx.lineTo(14, -6);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "9px monospace";
    ctx.textAlign = "center";
    ctx.fillText("Ξ", 0, 15);
  } else {
    const isMax = item.type === "barrier8";
    const layers = item.type === "barrier1" ? 1 : item.type === "barrier2" ? 2 : 8;
    const core = isMax ? "#ffe570" : "#59d7ff";
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, isMax ? `rgba(255, 230, 120, ${0.95 * pulse})` : `rgba(120, 220, 255, ${0.9 * pulse})`);
    glow.addColorStop(0.5, isMax ? `rgba(255, 180, 40, ${0.5 * pulse})` : `rgba(60, 160, 255, ${0.45 * pulse})`);
    glow.addColorStop(1, "rgba(40, 120, 255, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    for (let ring = 0; ring < layers; ring++) {
      const radius = 5 + ring * (isMax ? 1.1 : 2.2);
      ctx.strokeStyle = isMax
        ? `rgba(255, ${210 - ring * 8}, ${80 + ring * 6}, ${0.95 - ring * 0.06})`
        : `rgba(89, 215, 255, ${0.95 - ring * 0.18})`;
      ctx.lineWidth = isMax ? 1.4 : 2;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isMax ? "#fff8d0" : "#eaffff";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("B" + layers, 0, 3);
  }

  ctx.textAlign = "left";
  ctx.restore();
}

function drawMissiles() {
  for (const m of missiles) {
    const cx = m.x + m.w / 2;
    const cy = m.y + m.h / 2;
    const angle = Math.atan2(m.vy, m.vx) + Math.PI / 2;
    const speed = Math.hypot(m.vx, m.vy);
    const isMicro = m.kind === "micro";
    const level = m.level || 1;
    const bodyColor = isMicro ? "#fff" : getFunnelColor(level);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    if (isMicro) {
      for (let i = 1; i <= 2; i++) {
        ctx.globalAlpha = Math.max(0, 0.35 - i * 0.1);
        ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
        ctx.beginPath();
        ctx.ellipse(0, i * (2.5 + speed * 0.25), 1.5 + i * 0.3, 1.2 + i * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(0, -4);
      ctx.lineTo(1.5, 3);
      ctx.lineTo(0, 1.5);
      ctx.lineTo(-1.5, 3);
      ctx.closePath();
      ctx.fill();
    } else {
      for (let i = 1; i <= 3 + level; i++) {
        ctx.globalAlpha = Math.max(0, 0.38 - i * 0.06);
        ctx.fillStyle = i < 3 ? "rgba(255, 140, 80, 0.65)" : "rgba(180, 180, 180, 0.45)";
        ctx.beginPath();
        ctx.ellipse(0, i * (3.5 + speed * 0.35), 2.5 + level * 0.3 + i * 0.35, 2 + i * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowColor = bodyColor;
      ctx.shadowBlur = 6 + level * 2;
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.moveTo(0, -7 - level * 0.5);
      ctx.lineTo(3 + level * 0.3, 6);
      ctx.lineTo(0, 3.5);
      ctx.lineTo(-3 - level * 0.3, 6);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#fff";
      ctx.fillRect(-1.2, -5, 2.4, 4 + level * 0.4);
    }
    ctx.restore();
  }
}

function drawFlames() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const f of flames) {
    const alpha = Math.max(0, f.life / 28);
    const cx = f.x + f.w / 2;
    const cy = f.y + f.h / 2;
    const radius = 8 + (28 - f.life) * 0.35;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, `rgba(255, 255, 220, ${0.95 * alpha})`);
    grad.addColorStop(0.25, `rgba(255, 220, 40, ${0.85 * alpha})`);
    grad.addColorStop(0.55, `rgba(255, 90, 20, ${0.65 * alpha})`);
    grad.addColorStop(1, "rgba(255, 30, 0, 0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawThinLaserBeam(b, paletteKey) {
  const palette = THIN_LASER_PALETTES[paletteKey];
  const endX = b.x1 + (b.x2 - b.x1) * b.progress;
  const endY = b.y1 + (b.y2 - b.y1) * b.progress;
  const alpha = b.hit ? Math.max(0, b.hitFlash / 4) : 1;
  const impactAlpha = b.hit ? Math.max(0, b.hitFlash / 4) : 0;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  ctx.strokeStyle = `rgba(${palette.outer}, ${0.18 * alpha})`;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = palette.shadow;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(b.x1, b.y1);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = `rgba(${palette.core}, ${0.92 * alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(b.x1, b.y1);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  ctx.strokeStyle = `rgba(${palette.hot}, ${0.98 * alpha})`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(b.x1, b.y1);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  if (impactAlpha > 0) {
    ctx.fillStyle = `rgba(${palette.impact}, ${0.85 * impactAlpha})`;
    ctx.beginPath();
    ctx.arc(b.x2, b.y2, 1.5 + (1 - impactAlpha) * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(${palette.impactGlow}, ${0.45 * impactAlpha})`;
    ctx.beginPath();
    ctx.arc(b.x2, b.y2, 4 + (1 - impactAlpha) * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawZappers() {
  for (const b of zappers) {
    if (b.type === "xiBeam") {
      drawThinLaserBeam(b, "xi");
    } else if (b.type === "radLaser") {
      drawThinLaserBeam(b, "rad");
    } else if (b.type === "rad") {
      const lv = b.level || 1;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.shadowColor = getRadColor(lv);
      ctx.shadowBlur = 10 + lv * 3;
      ctx.fillStyle = `rgba(80, 255, 80, ${0.45 + lv * 0.04})`;
      ctx.fillRect(b.x - 1, b.y, b.w + 2, b.h);
      ctx.fillStyle = lv >= 3 ? "#efe" : "#cfc";
      ctx.fillRect(b.x + b.w * 0.2, b.y, b.w * 0.6, b.h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(b.x + b.w * 0.35, b.y + 2, b.w * 0.3, b.h - 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.fillStyle = "#eaffff";
      ctx.shadowColor = "#35f4ff";
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillRect(b.x - 3, b.y + 3, b.w + 6, 2);
      ctx.shadowBlur = 0;
    }
  }
}

function drawPlayerBarrier(x, y, w, h, layers, flash) {
  if (layers <= 0) return;
  const cx = x + w / 2;
  const cy = y + h / 2;
  const pulse = 0.82 + Math.sin(performance.now() * 0.008) * 0.18;
  const flashBoost = flash > 0 ? flash / 20 : 0;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < layers; i++) {
    const radiusX = w * 0.48 + i * 3.2;
    const radiusY = h * 0.52 + i * 3.5;
    const alpha = Math.min(0.95, (0.18 + i * 0.07) * pulse + flashBoost * 0.35);
    const hueShift = i >= 6 ? 45 : 0;
    ctx.strokeStyle = hueShift
      ? `rgba(255, ${210 - i * 4}, ${90 + i * 8}, ${alpha})`
      : `rgba(89, 215, 255, ${alpha})`;
    ctx.lineWidth = i === layers - 1 ? 2.4 : 1.6;
    ctx.beginPath();
    ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = `rgba(190, 235, 255, ${0.08 + flashBoost * 0.12})`;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.5 + layers * 3, h * 0.54 + layers * 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawWeaponStatus() {
  const entries = [];
  if (player.xiMode) {
    entries.push({ label: "Ξ LASER", color: "#78ff5a", timer: player.xiModeTimer, max: XI_DURATION });
  }
  if (!player.xiMode && player.airWeaponTimer > 0) {
    const radLv = player.airWeaponLevel || 1;
    entries.push({
      label: radLv >= 4 ? "RAD LASER" : "RAD Lv" + radLv,
      color: getRadColor(radLv),
      timer: player.airWeaponTimer,
      max: WEAPON_DURATION
    });
  }
  if (!player.xiMode && player.groundWeaponTimer > 0) {
    entries.push({ label: "FLAME", color: "#fa0", timer: player.groundWeaponTimer, max: WEAPON_DURATION });
  }
  if (!player.xiMode && player.missileWeaponTimer > 0) {
    entries.push({
      label: "FUNNEL Lv" + player.missileLevel,
      color: getFunnelColor(player.missileLevel || 1),
      timer: player.missileWeaponTimer,
      max: WEAPON_DURATION
    });
  }
  if (player.invincibleTimer > 0) {
    entries.push({ label: "INV STAR", color: "#ffe570", timer: player.invincibleTimer, max: INVINCIBLE_DURATION });
  }
  if (wildfire && wildfire.timer > 0) {
    entries.push({ label: "WILDFIRE", color: "#f80", timer: wildfire.timer, max: WILDFIRE_DURATION });
  }
  if (player.barrier > 0) {
    entries.push({
      label: player.xiMode ? "Ξ BARRIER" : "BARRIER",
      color: player.xiMode ? "#8cf" : "#59d7ff",
      segments: player.barrier,
      max: player.xiMode ? XI_BARRIER : MAX_BARRIER
    });
  }
  if (!entries.length) return;

  let y = 38;
  for (const entry of entries) {
    ctx.fillStyle = "rgba(2, 6, 18, 0.72)";
    roundRect(8, y, 128, 18, 4);
    ctx.fill();
    ctx.fillStyle = entry.color;
    ctx.font = "9px monospace";
    ctx.fillText(entry.label, 14, y + 12);
    if (entry.timer != null) {
      const ratio = entry.timer / entry.max;
      ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
      roundRect(72, y + 6, 48, 6, 2);
      ctx.fill();
      ctx.fillStyle = entry.color;
      roundRect(72, y + 6, 48 * ratio, 6, 2);
      ctx.fill();
    } else {
      const segW = entry.max > 10 ? 3 : 5;
      const gap = entry.max > 10 ? 1 : 2;
      const totalW = entry.max * segW + (entry.max - 1) * gap;
      let sx = 118 - totalW;
      for (let i = 0; i < entry.max; i++) {
        ctx.fillStyle = i < entry.segments ? entry.color : "rgba(255, 255, 255, 0.12)";
        roundRect(sx + i * (segW + gap), y + 6, segW, 6, 1);
        ctx.fill();
      }
    }
    y += 22;
  }
}

function drawLayerLegend() {
  const alpha = getLegendAlpha();
  if (alpha <= 0) return;

  const boxX = 8;
  const boxY = H - LEGEND_BOX_H - LEGEND_MARGIN;
  const row1 = boxY + 18;
  const row2 = boxY + 40;
  const row3Icon = boxY + 58;
  const row3Text = boxY + 70;
  const row4 = boxY + 82;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(2, 6, 18, 0.82)";
  roundRect(boxX, boxY, LEGEND_BOX_W, LEGEND_BOX_H, 6);
  ctx.fill();

  ctx.fillStyle = "#35f4ff";
  ctx.fillRect(boxX + 10, row1 - 11, 20, 4);
  ctx.fillStyle = "#eaffff";
  ctx.font = "12px monospace";
  ctx.fillText("AIR: SPACE", boxX + 36, row1);

  ctx.strokeStyle = "#ffe570";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(boxX + 138, row1 - 7, 8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ffe570";
  ctx.fillText("GROUND: X", boxX + 154, row1);

  ctx.font = "11px monospace";
  ctx.fillStyle = "#ddd";

  let ix = boxX + 10;
  ctx.fillStyle = "#f80";
  ctx.beginPath();
  ctx.moveTo(ix, row2 - 11);
  ctx.lineTo(ix + 9, row2 - 2);
  ctx.lineTo(ix - 9, row2 - 2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#ddd";
  ctx.fillText("FLM", ix + 14, row2);

  ix = boxX + 62;
  ctx.strokeStyle = "#59d7ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(ix, row2 - 6, 5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.fillText("B1", ix + 9, row2);

  ix = boxX + 102;
  ctx.beginPath();
  ctx.arc(ix, row2 - 6, 7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ix, row2 - 6, 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillText("B2", ix + 11, row2);

  ix = boxX + 146;
  ctx.strokeStyle = "#ffe570";
  ctx.beginPath();
  ctx.arc(ix, row2 - 6, 8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.fillText("B8", ix + 12, row2);

  ix = boxX + 192;
  ctx.save();
  ctx.translate(ix, row2 - 6);
  ctx.fillStyle = "#ffe570";
  ctx.fill(buildStarPath(8, 3.5));
  ctx.restore();
  ctx.fillStyle = "#ddd";
  ctx.fillText("STR", ix + 12, row2);

  ix = boxX + 238;
  ctx.fillStyle = "#f80";
  ctx.beginPath();
  ctx.moveTo(ix, row2 - 12);
  ctx.lineTo(ix + 9, row2 - 2);
  ctx.lineTo(ix - 9, row2 - 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#ff0";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ix, row2 - 12);
  ctx.lineTo(ix, row2 - 17);
  ctx.moveTo(ix, row2 - 12);
  ctx.lineTo(ix - 5, row2 - 7);
  ctx.moveTo(ix, row2 - 12);
  ctx.lineTo(ix + 5, row2 - 7);
  ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.fillText("WFR", ix + 14, row2);

  for (let lv = 1; lv <= 4; lv++) {
    const rx = boxX + 10 + (lv - 1) * 38;
    ctx.save();
    ctx.translate(rx + 10, row3Icon);
    ctx.strokeStyle = RAD_ITEM_COLORS[lv - 1];
    ctx.lineWidth = 2;
    for (let i = 0; i < lv; i++) {
      const ang = -Math.PI / 2 + (i - (lv - 1) / 2) * 0.45;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * 3, Math.sin(ang) * 3);
      ctx.lineTo(Math.cos(ang) * 10, Math.sin(ang) * 10);
      ctx.stroke();
    }
    ctx.restore();
    ctx.fillStyle = "#ccc";
    ctx.font = "10px monospace";
    ctx.fillText("R" + lv, rx + 5, row3Text);
  }

  for (let lv = 1; lv <= 4; lv++) {
    const lx = boxX + 176 + (lv - 1) * 42;
    ctx.save();
    ctx.translate(lx + 10, row3Icon);
    ctx.fillStyle = FUNNEL_ITEM_COLORS[lv - 1];
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.lineTo(3.5, 5);
    ctx.lineTo(0, 2.5);
    ctx.lineTo(-3.5, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#ccc";
    ctx.font = "10px monospace";
    ctx.fillText("F" + lv, lx + 5, row3Text);
  }

  ctx.fillStyle = "#bbb";
  ctx.font = "10px monospace";
  ctx.fillText("R1〜R4=RAD Lv | F1〜F4=誘導弾Lv | WFR=山火事 | Ξ=変形", boxX + 10, row4);
  ctx.restore();
}

function draw() {
  const shake = getWildfireShake();
  ctx.save();
  ctx.translate(shake.x, shake.y);

  drawBackground();
  drawWildfireBackdrop();

  for (const g of groundTargets) {
    if (g.alive) drawGroundTarget(g, worldToScreen(g.worldY));
  }

  for (const e of airEnemies) {
    if (e.alive) drawAirEnemy(e);
  }

  for (const item of items) drawPowerUp(item);

  drawZappers();

  ctx.fillStyle = "#ffe570";
  blasters.forEach(b => {
    ctx.strokeStyle = "rgba(255, 229, 112, 0.55)";
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2 + 13, 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  drawFlames();
  drawMissiles();

  drawEnemyBullets();

  if (!explosion) {
    if (player.invincibleTimer > 0) {
      drawInvincibleAura(player.x, player.y, player.w, player.h, player.invincibleTimer);
    }
    drawWildfirePlayerGlow(player.x, player.y, player.w, player.h);
    const blinkOff = player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0;
    if (!blinkOff) {
      ctx.save();
      if (player.invincibleTimer > 0) ctx.globalAlpha = 0.82;
      if (wildfire && wildfire.timer > 0) {
        const backlit = getWildfireIntensity();
        ctx.shadowColor = `rgba(255, ${120 + backlit * 80}, 20, ${0.55 * backlit})`;
        ctx.shadowBlur = 14 + backlit * 10;
      }
      if (player.xiMode) {
        drawXiGundam(player.x, player.y, player.w, player.h, player.bank, player.afterburnerFrame);
      } else {
        drawPlayer(player.x, player.y, player.w, player.h, player.bank, player.afterburner, player.afterburnerFrame);
      }
      ctx.restore();
    }
    if (player.xiMode) {
      drawXiBarrier(player.x, player.y, player.w, player.h, player.barrier, player.barrierFlash);
    } else {
      drawPlayerBarrier(player.x, player.y, player.w, player.h, player.barrier, player.barrierFlash);
    }
  }

  drawWildfireFront();

  drawBursts();
  drawExplosion();

  ctx.fillStyle = "#0f0";
  ctx.font = "14px monospace";
  ctx.fillText("SCORE:" + score + "  WAVE:" + wave, 10, 22);
  drawWeaponStatus();
  drawLivesHUD();

  if (paused) {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, W, H);
  }

  drawLayerLegend();

  if (paused) {
    ctx.fillStyle = "#0f0";
    ctx.textAlign = "center";
    ctx.font = "20px monospace";
    ctx.fillText("PAUSED", W / 2, H / 2 - 10);
    ctx.font = "14px monospace";
    ctx.fillText("Press P to resume", W / 2, H / 2 + 20);
    ctx.textAlign = "left";
  }

  if (gameOver) {
    ctx.fillStyle = "#0f0";
    ctx.textAlign = "center";
    ctx.font = "20px monospace";
    ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
    ctx.font = "14px monospace";
    ctx.fillText("Press R to restart", W / 2, H / 2 + 20);
    ctx.textAlign = "left";
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX"].includes(e.code)) {
    e.preventDefault();
  }
  if (e.code === "KeyR" && gameOver) init(true);
  if (e.code === "KeyP" && !e.repeat && !gameOver && !explosion) {
    paused = !paused;
    if (paused) resetLegendFade();
    e.preventDefault();
  }
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

init(true);
loop();
</script>
</body>
</html>
