<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メビウス</title>
<style>
html, body { height: 100%; margin: 0; overflow: hidden; }
body {
  background: #020612;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  gap: 4px;
  font-family: monospace;
  color: #0f0;
}
canvas {
  border: 2px solid #59d7ff;
  box-shadow: 0 0 18px rgba(89, 215, 255, 0.7);
  max-width: 100%;
  max-height: calc(100% - 1.25rem);
  width: auto;
  height: auto;
  display: block;
}
#info { flex-shrink: 0; font-size: 13px; line-height: 1.3; margin: 0; }
</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<div id="info">←→↑↓ 移動 | スペース 対空 | X 対地 | アイテムで武器強化・バリア・無敵・誘導弾・山火事・Ξ | R リスタート</div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;
const SCROLL_SPEED = 1.2;
const WORLD_H = 4800;

let player, zappers, blasters, flames, missiles, airEnemies, groundTargets, enemyBullets, items;
let scrollY, score, lives, wave, gameOver, paused = false, keys = {}, shootCooldown = 0, bombCooldown = 0;
let explosion = null, spawnTimer = 0, groundSpawnTimer = 0, wildfire = null, legendFadeTimer = 0;
let wildfireParticles = [];
let wildfireItemDelayTimer = 0;
let xiItemDelayTimer = 0;
const WEAPON_DURATION = 540;
const INVINCIBLE_DURATION = 480;
const WILDFIRE_DURATION = 180;
const LEGEND_FADE_FRAMES = 600;
const LEGEND_BOX_H = 86;
const LEGEND_BOX_W = 624;
const LEGEND_MARGIN = 4;
const LEGEND_AREA_H = LEGEND_BOX_H + LEGEND_MARGIN;
const WILDFIRE_ITEM_DELAY_FRAMES = 600;
const XI_ITEM_DELAY_FRAMES = 900;
const POWERUP_DROP_RATE = 0.17;
const MAX_BARRIER = 8;
const XI_DURATION = 900;
const XI_BARRIER = 16;
const XI_FUNNEL_LEVEL = 10;
const XI_FUNNEL_SPEC = { count: 20, speed: 32, vy: -22, turnRate: 0.28, damage: 4, interval: 6 };
const FIGHTER_SIZE = { w: 32, h: 36 };
const XI_SIZE = { w: 48, h: 52 };
const FUNNEL_LEVELS = [
  null,
  { count: 2, speed: 6, vy: -4.5, turnRate: 0.15, damage: 2, interval: 22 },
  { count: 4, speed: 12, vy: -9, turnRate: 0.15, damage: 2, interval: 22 },
  { count: 6, speed: 18, vy: -13.5, turnRate: 0.18, damage: 2, interval: 20 },
  { count: 8, speed: 24, vy: -18, turnRate: 0.22, damage: 3, interval: 18 },
  { count: 10, speed: 26, vy: -19, turnRate: 0.24, damage: 3, interval: 16 },
  { count: 12, speed: 28, vy: -20, turnRate: 0.25, damage: 3, interval: 14 },
  { count: 14, speed: 29, vy: -21, turnRate: 0.26, damage: 4, interval: 12 },
  { count: 16, speed: 30, vy: -21.5, turnRate: 0.27, damage: 4, interval: 10 },
  { count: 18, speed: 31, vy: -22, turnRate: 0.27, damage: 4, interval: 8 },
  { count: 20, speed: 32, vy: -22, turnRate: 0.28, damage: 4, interval: 6 }
];
const FUNNEL_ITEM_COLORS = ["#f88", "#f66", "#f44", "#ffd060", "#fff8a0"];
const RAD_LEVELS = [
  null,
  {
    cooldown: 5,
    pierce: true,
    beams: [{ ox: 0, oy: 0, w: 8, h: 20, speed: 10, damage: 2 }]
  },
  {
    cooldown: 4,
    pierce: true,
    beams: [
      { ox: 0, oy: 0, w: 12, h: 26, speed: 11, damage: 2 },
      { ox: -14, oy: 6, w: 7, h: 18, speed: 10, damage: 1 },
      { ox: 13, oy: 6, w: 7, h: 18, speed: 10, damage: 1 }
    ]
  },
  {
    cooldown: 3,
    pierce: true,
    beams: [
      { ox: 0, oy: 0, w: 14, h: 28, speed: 12, damage: 3 },
      { ox: -18, oy: 4, w: 8, h: 20, speed: 11, damage: 2 },
      { ox: 18, oy: 4, w: 8, h: 20, speed: 11, damage: 2 },
      { ox: -28, oy: 10, w: 6, h: 16, speed: 10, damage: 1 }
    ]
  },
  {
    laser: true,
    damage: 4
  }
];
const RAD_ITEM_COLORS = ["#bdf", "#9f9", "#6f6", "#fa0"];
const THIN_LASER_PALETTES = {
  xi: {
    outer: "60, 255, 80",
    core: "120, 255, 90",
    hot: "220, 255, 210",
    impact: "255, 255, 230",
    impactGlow: "255, 180, 80",
    shadow: "#3f3"
  },
  rad: {
    outer: "255, 120, 40",
    core: "255, 180, 70",
    hot: "255, 240, 210",
    impact: "255, 255, 220",
    impactGlow: "255, 100, 30",
    shadow: "#f80"
  }
};
const STARTING_LOADOUT = {
  radBeam: true,
  flame: true,
  barrier8: true,
  invincibleStar: true
};

function applyStartingLoadout() {
  if (STARTING_LOADOUT.radBeam) {
    applyRadBeamItem(3);
  }
  if (STARTING_LOADOUT.flame) {
    player.groundWeapon = "flame";
    player.groundWeaponTimer = WEAPON_DURATION;
  }
  if (STARTING_LOADOUT.barrier8) {
    player.barrier = MAX_BARRIER;
  }
  if (STARTING_LOADOUT.invincibleStar) {
    player.invincibleTimer = INVINCIBLE_DURATION;
  }
}

function resetLegendFade() {
  legendFadeTimer = LEGEND_FADE_FRAMES;
}

function updateLegendFade() {
  if (legendFadeTimer > 0) legendFadeTimer--;
}

function getLegendAlpha() {
  if (paused) return 1;
  return Math.max(0, legendFadeTimer / LEGEND_FADE_FRAMES);
}

function init(resetScore) {
  player = {
    x: W / 2 - 16, y: H - 76, w: 32, h: 36, speed: 4.5, bank: 0, afterburner: 0, afterburnerFrame: 0,
    airWeapon: "normal", groundWeapon: "normal", airWeaponTimer: 0, airWeaponLevel: 0, groundWeaponTimer: 0,
    missileWeaponTimer: 0, missileLaunchTimer: 0, missileLevel: 0,
    barrier: 0, barrierFlash: 0, invincibleTimer: 0,
    xiMode: false, xiModeTimer: 0, xiTransformFrame: 0, microMissileTimer: 0
  };
  zappers = [];
  blasters = [];
  flames = [];
  missiles = [];
  airEnemies = [];
  groundTargets = [];
  enemyBullets = [];
  items = [];
  scrollY = 0;
  if (resetScore) {
    score = 0;
    lives = 4;
    wave = 1;
  }
  gameOver = false;
  paused = false;
  shootCooldown = 0;
  bombCooldown = 0;
  explosion = null;
  spawnTimer = 0;
  groundSpawnTimer = 0;
  wildfire = null;
  wildfireParticles = [];
  wildfireItemDelayTimer = WILDFIRE_ITEM_DELAY_FRAMES;
  xiItemDelayTimer = XI_ITEM_DELAY_FRAMES;
  applyStartingLoadout();
  seedInitialGround();
  resetLegendFade();
  spawnPowerUp(player.x + player.w / 2, player.y - 52, "wildfire");
}

function seedInitialGround() {
  for (let y = -40; y < H; y += 70 + Math.floor(Math.random() * 75)) {
    if (Math.random() < 0.82) spawnGroundTarget(y);
  }
}

function spawnGroundTarget(worldY) {
  const specs = [
    { type: "tank", w: 36, h: 20, hp: 1, score: 200, weight: 34 },
    { type: "aaGun", w: 34, h: 30, hp: 1, score: 350, weight: 23, fireCooldown: 35 },
    { type: "pillbox", w: 42, h: 26, hp: 2, score: 400, weight: 20 },
    { type: "smallFortress", w: 54, h: 34, hp: 3, score: 700, weight: 16 },
    { type: "giantFortress", w: 86, h: 56, hp: 6, score: 1500, weight: 7, fireCooldown: 55 }
  ];
  const totalWeight = specs.reduce((sum, spec) => sum + spec.weight, 0);
  let pick = Math.random() * totalWeight;
  let spec = specs[0];
  for (const candidate of specs) {
    pick -= candidate.weight;
    if (pick <= 0) {
      spec = candidate;
      break;
    }
  }

  groundTargets.push({
    worldY,
    x: 24 + Math.random() * (W - spec.w - 48),
    w: spec.w,
    h: spec.h,
    type: spec.type,
    hp: spec.hp,
    fireCooldown: spec.fireCooldown ? spec.fireCooldown + Math.floor(Math.random() * 45) : 0,
    alive: true,
    score: spec.score
  });
}

function spawnAirEnemy() {
  const patterns = ["straight", "sine", "dive"];
  const pattern = patterns[Math.floor(Math.random() * patterns.length)];
  const kind = Math.random() < 0.35 ? "large" : "small";
  airEnemies.push({
    x: 30 + Math.random() * (W - 60),
    y: -30,
    w: kind === "large" ? 32 : 22,
    h: kind === "large" ? 24 : 18,
    kind,
    pattern,
    phase: Math.random() * Math.PI * 2,
    baseX: 30 + Math.random() * (W - 60),
    speedY: kind === "large" ? 1.2 + wave * 0.08 : 2 + wave * 0.12,
    speedX: 0,
    hp: kind === "large" ? 2 : 1,
    alive: true,
    score: kind === "large" ? 150 : 80,
    shootTimer: 60 + Math.floor(Math.random() * 90)
  });
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function worldToScreen(worldY) {
  return worldY + scrollY;
}

function pickPowerUpType() {
  const roll = Math.random();
  if (roll < 0.02) return "radBeam1";
  if (roll < 0.04) return "radBeam2";
  if (roll < 0.07) return "radBeam3";
  if (roll < 0.10) return "radBeam4";
  if (roll < 0.20) return "flame";
  if (roll < 0.27) return "funnelMissile1";
  if (roll < 0.31) return "funnelMissile2";
  if (roll < 0.34) return "funnelMissile3";
  if (roll < 0.36) return "funnelMissile4";
  if (roll < 0.50) return "barrier1";
  if (roll < 0.64) return "barrier2";
  if (roll < 0.75) return "barrier8";
  if (roll < 0.765) return "xi";
  if (roll < 0.785) return "wildfire";
  return "invincibleStar";
}

function getFunnelSpec(level) {
  if (level >= XI_FUNNEL_LEVEL) return XI_FUNNEL_SPEC;
  return FUNNEL_LEVELS[level] || FUNNEL_LEVELS[1];
}

function getFunnelColor(level) {
  return FUNNEL_ITEM_COLORS[Math.min(Math.max(level, 1), FUNNEL_ITEM_COLORS.length) - 1];
}

function getRadSpec(level) {
  return RAD_LEVELS[level] || RAD_LEVELS[1];
}

function getRadColor(level) {
  return RAD_ITEM_COLORS[Math.min(Math.max(level, 1), RAD_ITEM_COLORS.length) - 1];
}

function getRadBeamLevelFromItem(type) {
  if (type === "radBeam") return 1;
  const level = parseInt(type.replace("radBeam", ""), 10);
  return level >= 1 && level <= 4 ? level : 1;
}

function isRadBeamItem(type) {
  return type === "radBeam" || type.startsWith("radBeam");
}

function applyRadBeamItem(level) {
  player.airWeapon = "radBeam";
  player.airWeaponLevel = Math.max(player.airWeaponLevel || 0, level);
  player.airWeaponTimer = WEAPON_DURATION;
}

function getFunnelMissileLevelFromItem(type) {
  if (type === "funnelMissile") return 1;
  const level = parseInt(type.replace("funnelMissile", ""), 10);
  return level >= 1 && level <= 4 ? level : 1;
}

function isFunnelMissileItem(type) {
  return type === "funnelMissile" || type.startsWith("funnelMissile");
}

function spawnPowerUp(x, y, type) {
  items.push({
    x: x - 10,
    y: y - 10,
    w: 20,
    h: 20,
    type: type || pickPowerUpType(),
    bob: Math.random() * Math.PI * 2,
    timer: 0,
    life: 480
  });
}

function applyBarrierItem(type) {
  const maxBarrier = player.xiMode ? XI_BARRIER : MAX_BARRIER;
  if (type === "barrier1") player.barrier = Math.min(maxBarrier, player.barrier + 1);
  else if (type === "barrier2") player.barrier = Math.min(maxBarrier, player.barrier + 2);
  else if (type === "barrier8") player.barrier = maxBarrier;
  player.barrierFlash = 24;
}

function spawnWildfireParticle(x, y, vx, vy, kind, life, size) {
  wildfireParticles.push({
    x, y, vx, vy, kind,
    life,
    maxLife: life,
    size,
    rot: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.12
  });
}

function burstWildfireParticles(cx, cy, count, spread, speed) {
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.95;
    const spd = speed * (0.35 + Math.random() * 0.75);
    const roll = Math.random();
    const kind = roll < 0.45 ? "fire" : roll < 0.72 ? "smoke" : "spark";
    spawnWildfireParticle(
      cx + (Math.random() - 0.5) * spread,
      cy + (Math.random() - 0.5) * spread * 0.35,
      Math.cos(angle) * spd + (Math.random() - 0.5) * 1.2,
      Math.sin(angle) * spd,
      kind,
      22 + Math.floor(Math.random() * 40),
      kind === "spark" ? 1.5 + Math.random() * 2.5 : 4 + Math.random() * 14
    );
  }
}

function triggerWildfire() {
  wildfire = {
    timer: WILDFIRE_DURATION,
    frame: 0,
    flash: 24,
    shake: 18,
    shockwave: 10,
    cores: []
  };
  wildfireParticles = [];

  for (let i = 0; i < 9; i++) {
    const cx = 44 + (W - 88) * (i / 8) + (Math.random() - 0.5) * 36;
    const cy = H * (0.56 + Math.random() * 0.34);
    wildfire.cores.push({
      x: cx,
      y: cy,
      phase: Math.random() * Math.PI * 2,
      power: 0.72 + Math.random() * 0.28
    });
    burstWildfireParticles(cx, cy, 32, 48, 7);
  }
  burstWildfireParticles(W / 2, H * 0.8, 64, W * 0.55, 9);
  burstWildfireParticles(W * 0.25, H * 0.7, 24, 80, 6);
  burstWildfireParticles(W * 0.75, H * 0.72, 24, 80, 6);

  for (const g of groundTargets) {
    if (!g.alive) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < -g.h || sy > H) continue;
    g.alive = false;
    score += g.score;
    burstWildfireParticles(g.x + g.w / 2, sy + g.h / 2, 14, 24, 5);
    addBurst(g.x + g.w / 2, sy + g.h / 2, 8, ["#fff", "#ff0", "#f80", "#f60"]);
  }

  enemyBullets = enemyBullets.filter(b => {
    if (b.kind !== "ground") return true;
    const sy = b.y + b.h / 2;
    if (sy < H * 0.3) return true;
    burstWildfireParticles(b.x + b.w / 2, sy, 4, 10, 3);
    return false;
  });
}

function updateWildfire() {
  if (!wildfire) return;
  wildfire.frame++;
  wildfire.timer--;
  wildfire.shockwave += 5.5 + wildfire.frame * 0.1;
  if (wildfire.flash > 0) wildfire.flash--;
  if (wildfire.shake > 0.35) wildfire.shake *= 0.88;
  else wildfire.shake = 0;

  for (let i = wildfireParticles.length - 1; i >= 0; i--) {
    const p = wildfireParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.kind === "smoke") {
      p.vy -= 0.06;
      p.vx *= 0.985;
    } else if (p.kind === "fire") {
      p.vy -= 0.12;
      p.vx += (Math.random() - 0.5) * 0.08;
    } else {
      p.vy += 0.04;
    }
    p.life--;
    p.rot += p.spin;
    if (p.life <= 0) wildfireParticles.splice(i, 1);
  }

  if (wildfire.frame % 2 === 0) {
    for (const core of wildfire.cores) {
      if (Math.random() < 0.65) burstWildfireParticles(core.x, core.y, 2, 22, 2.8);
    }
  }
  if (wildfire.frame % 8 === 0 && Math.random() < 0.5) {
    burstWildfireParticles(Math.random() * W, H * (0.5 + Math.random() * 0.45), 6, 30, 4);
  }

  if (wildfire.timer <= 0) {
    wildfire = null;
    wildfireParticles = [];
    return;
  }

  if (wildfire.frame % 18 === 0) {
    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < H * 0.38 || sy > H + g.h) continue;
      g.hp -= 2;
      if (g.hp <= 0) {
        g.alive = false;
        score += g.score;
        burstWildfireParticles(g.x + g.w / 2, sy + g.h / 2, 10, 20, 4);
        addBurst(g.x + g.w / 2, sy + g.h / 2, 6, ["#fff", "#ff0", "#f80"]);
      }
    }
  }
}

function getWildfireShake() {
  if (!wildfire || wildfire.shake <= 0.35) return { x: 0, y: 0 };
  return {
    x: (Math.random() - 0.5) * wildfire.shake,
    y: (Math.random() - 0.5) * wildfire.shake * 0.65
  };
}

function getWildfireIntensity() {
  if (!wildfire || wildfire.timer <= 0) return 0;
  const ratio = wildfire.timer / WILDFIRE_DURATION;
  const burstBoost = wildfire.frame < 50 ? 1 + (50 - wildfire.frame) / 50 : 1;
  return ratio * burstBoost;
}

function drawBlastCloud(cx, cy, radius, intensity, frame, phase) {
  const rise = Math.sin(frame * 0.06 + phase) * 6;
  const cyR = cy - rise;
  const r = radius * (0.92 + Math.sin(frame * 0.09 + phase) * 0.08);

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  const smokeGrad = ctx.createRadialGradient(cx, cyR - r * 0.15, r * 0.05, cx, cyR, r * 1.55);
  smokeGrad.addColorStop(0, `rgba(30, 15, 8, ${0.42 * intensity})`);
  smokeGrad.addColorStop(0.35, `rgba(70, 28, 12, ${0.28 * intensity})`);
  smokeGrad.addColorStop(0.7, `rgba(40, 18, 8, ${0.14 * intensity})`);
  smokeGrad.addColorStop(1, "rgba(20, 8, 4, 0)");
  ctx.fillStyle = smokeGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cyR - r * 0.1, r * 1.05, r * 0.82, 0, 0, Math.PI * 2);
  ctx.fill();

  for (let l = 0; l < 6; l++) {
    const ang = phase + l * 1.05 + frame * 0.025;
    const lx = cx + Math.cos(ang) * r * 0.42;
    const ly = cyR - r * (0.42 + Math.sin(ang) * 0.12) - Math.sin(frame * 0.07 + l * 1.3) * 10;
    const lr = r * (0.38 + (l % 3) * 0.08);
    const lobe = ctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
    lobe.addColorStop(0, `rgba(255, 245, 210, ${0.75 * intensity})`);
    lobe.addColorStop(0.3, `rgba(255, 170, 50, ${0.55 * intensity})`);
    lobe.addColorStop(0.65, `rgba(255, 70, 10, ${0.28 * intensity})`);
    lobe.addColorStop(1, "rgba(120, 30, 0, 0)");
    ctx.fillStyle = lobe;
    ctx.beginPath();
    ctx.ellipse(lx, ly, lr * 0.95, lr * 0.78, ang * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  const body = ctx.createRadialGradient(cx, cyR - r * 0.42, 0, cx, cyR - r * 0.08, r * 1.05);
  body.addColorStop(0, `rgba(255, 255, 245, ${0.95 * intensity})`);
  body.addColorStop(0.12, `rgba(255, 240, 160, ${0.88 * intensity})`);
  body.addColorStop(0.32, `rgba(255, 150, 35, ${0.72 * intensity})`);
  body.addColorStop(0.58, `rgba(255, 70, 8, ${0.45 * intensity})`);
  body.addColorStop(0.82, `rgba(180, 35, 0, ${0.18 * intensity})`);
  body.addColorStop(1, "rgba(80, 15, 0, 0)");
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.ellipse(cx, cyR - r * 0.22, r * 0.88, r * 1.02, 0, 0, Math.PI * 2);
  ctx.fill();

  const core = ctx.createRadialGradient(cx, cyR - r * 0.38, 0, cx, cyR - r * 0.32, r * 0.38);
  core.addColorStop(0, `rgba(255, 255, 255, ${intensity})`);
  core.addColorStop(0.35, `rgba(255, 255, 220, ${0.85 * intensity})`);
  core.addColorStop(0.7, `rgba(255, 220, 80, ${0.4 * intensity})`);
  core.addColorStop(1, "rgba(255, 160, 40, 0)");
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(cx, cyR - r * 0.35, r * 0.36, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawWildfireShockwave(intensity) {
  if (!wildfire) return;
  const r = wildfire.shockwave;
  const alpha = Math.max(0, 1 - r / (W * 0.95)) * intensity * 0.75;
  if (alpha <= 0.01) return;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (let ring = 0; ring < 3; ring++) {
    const rr = r - ring * 18;
    if (rr <= 0) continue;
    ctx.strokeStyle = `rgba(255, ${220 - ring * 30}, ${120 - ring * 25}, ${alpha * (0.55 - ring * 0.12)})`;
    ctx.lineWidth = 6 - ring * 1.5;
    ctx.beginPath();
    ctx.ellipse(W / 2, H * 0.74, rr * 1.15, rr * 0.22, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWildfireParticles(intensity) {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const p of wildfireParticles) {
    const t = p.life / p.maxLife;
    const alpha = t * intensity;
    if (alpha <= 0.02) continue;
    if (p.kind === "smoke") {
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * t);
      grad.addColorStop(0, `rgba(50, 25, 12, ${alpha * 0.35})`);
      grad.addColorStop(0.5, `rgba(30, 12, 6, ${alpha * 0.2})`);
      grad.addColorStop(1, "rgba(10, 5, 2, 0)");
      ctx.fillStyle = grad;
    } else if (p.kind === "fire") {
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * t);
      grad.addColorStop(0, `rgba(255, 255, 220, ${alpha * 0.9})`);
      grad.addColorStop(0.35, `rgba(255, 160, 40, ${alpha * 0.65})`);
      grad.addColorStop(1, "rgba(255, 40, 0, 0)");
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.95})`;
    }
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.size * t, p.size * t * 0.65, p.rot, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawWildfireBackdrop() {
  if (!wildfire || wildfire.timer <= 0) return;
  const intensity = getWildfireIntensity();
  const frame = wildfire.frame;

  ctx.save();
  const haze = ctx.createLinearGradient(0, H * 0.2, 0, H);
  haze.addColorStop(0, `rgba(80, 30, 5, ${0.04 * intensity})`);
  haze.addColorStop(0.45, `rgba(160, 55, 8, ${0.16 * intensity})`);
  haze.addColorStop(0.72, `rgba(120, 35, 5, ${0.28 * intensity})`);
  haze.addColorStop(1, `rgba(40, 10, 0, ${0.38 * intensity})`);
  ctx.fillStyle = haze;
  ctx.fillRect(0, H * 0.18, W, H * 0.82);

  const groundGlow = ctx.createRadialGradient(W / 2, H * 0.88, 0, W / 2, H * 0.72, W * 0.72);
  groundGlow.addColorStop(0, `rgba(255, 140, 30, ${0.22 * intensity})`);
  groundGlow.addColorStop(0.45, `rgba(255, 70, 10, ${0.12 * intensity})`);
  groundGlow.addColorStop(1, "rgba(80, 20, 0, 0)");
  ctx.fillStyle = groundGlow;
  ctx.fillRect(0, H * 0.35, W, H * 0.65);

  drawWildfireShockwave(intensity);

  for (const core of wildfire.cores) {
    const swell = 1 + Math.sin(frame * 0.07 + core.phase) * 0.12;
    const radius = (58 + Math.sin(frame * 0.05 + core.phase * 2) * 14) * swell * (0.55 + intensity * 0.55);
    drawBlastCloud(core.x, core.y, radius, core.power * intensity * 0.55, frame, core.phase);
  }
  ctx.restore();
}

function drawWildfireFront() {
  if (!wildfire || wildfire.timer <= 0) return;
  const intensity = getWildfireIntensity();
  const frame = wildfire.frame;

  for (const core of wildfire.cores) {
    const swell = 1 + Math.sin(frame * 0.07 + core.phase) * 0.12;
    const radius = (62 + Math.sin(frame * 0.05 + core.phase * 2) * 16) * swell * (0.65 + intensity * 0.45);
    drawBlastCloud(core.x, core.y, radius, core.power * intensity, frame, core.phase + 0.4);
  }

  drawWildfireParticles(intensity);

  if (wildfire.flash > 0) {
    const fa = wildfire.flash / 24;
    ctx.save();
    ctx.fillStyle = `rgba(255, 248, 220, ${fa * 0.62})`;
    ctx.fillRect(0, 0, W, H);
    const coreFlash = ctx.createRadialGradient(W / 2, H * 0.65, 0, W / 2, H * 0.55, W * 0.55);
    coreFlash.addColorStop(0, `rgba(255, 255, 255, ${fa * 0.75})`);
    coreFlash.addColorStop(0.35, `rgba(255, 220, 120, ${fa * 0.35})`);
    coreFlash.addColorStop(1, "rgba(255, 120, 0, 0)");
    ctx.fillStyle = coreFlash;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function drawWildfirePlayerGlow(x, y, w, h) {
  if (!wildfire || wildfire.timer <= 0) return;
  const intensity = getWildfireIntensity();
  const cx = x + w / 2;
  const cy = y + h / 2;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const rim = ctx.createRadialGradient(cx, cy, w * 0.2, cx, cy, w * 1.4);
  rim.addColorStop(0, `rgba(255, 180, 60, ${0.35 * intensity})`);
  rim.addColorStop(0.5, `rgba(255, 90, 20, ${0.18 * intensity})`);
  rim.addColorStop(1, "rgba(255, 40, 0, 0)");
  ctx.fillStyle = rim;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 1.1, h * 1.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function collectPowerUp(item) {
  if (isRadBeamItem(item.type)) {
    const lv = getRadBeamLevelFromItem(item.type);
    applyRadBeamItem(lv);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 10 + lv * 2, ["#ff0", "#0f0", "#fa0", "#fff", RAD_ITEM_COLORS[lv - 1]]);
  } else if (item.type === "flame") {
    player.groundWeapon = "flame";
    player.groundWeaponTimer = WEAPON_DURATION;
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 10, ["#ff0", "#0f0", "#fa0", "#fff"]);
  } else if (isFunnelMissileItem(item.type)) {
    applyFunnelMissileItem(getFunnelMissileLevelFromItem(item.type));
    const lv = getFunnelMissileLevelFromItem(item.type);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 12 + lv * 2, ["#f8a", "#fa0", "#fff", "#f66", FUNNEL_ITEM_COLORS[lv - 1]]);
  } else if (item.type === "invincibleStar") {
    player.invincibleTimer = INVINCIBLE_DURATION;
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 16, ["#ff0", "#fff", "#f8f", "#0ff", "#fa0"]);
  } else if (item.type === "wildfire") {
    triggerWildfire();
    burstWildfireParticles(item.x + item.w / 2, item.y + item.h / 2, 24, 28, 6);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 12, ["#fff", "#ff0", "#f80", "#fa0"]);
  } else if (item.type === "xi") {
    applyXiItem(item.x + item.w / 2, item.y + item.h / 2);
  } else {
    applyBarrierItem(item.type);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 12, ["#8cf", "#adf", "#fff", "#59d7ff"]);
  }
}

function tryDropPowerUp(x, y) {
  if (Math.random() < POWERUP_DROP_RATE) spawnPowerUp(x, y);
}

function getAirEnemyCenter(e) {
  return { x: e.x + e.w / 2, y: e.y + e.h / 2 };
}

function getXiLaserTargetCenter(targetType, ref) {
  if (targetType === "air") return getAirEnemyCenter(ref);
  const sy = worldToScreen(ref.worldY);
  return { x: ref.x + ref.w / 2, y: sy + ref.h / 2 };
}

function findXiLaserTargets(limit) {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const targets = [];
  for (const e of airEnemies) {
    if (!e.alive) continue;
    const center = getAirEnemyCenter(e);
    targets.push({
      targetType: "air",
      ref: e,
      x: center.x,
      y: center.y,
      dist: Math.hypot(center.x - cx, center.y - cy)
    });
  }
  for (const g of groundTargets) {
    if (!g.alive) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < -g.h || sy > H + g.h) continue;
    const center = { x: g.x + g.w / 2, y: sy + g.h / 2 };
    targets.push({
      targetType: "ground",
      ref: g,
      x: center.x,
      y: center.y,
      dist: Math.hypot(center.x - cx, center.y - cy)
    });
  }
  targets.sort((a, b) => a.dist - b.dist);
  return targets.slice(0, limit);
}

function damageTargetFromXiLaser(targetType, ref, hitX, hitY, damage) {
  if (!ref.alive) return;
  ref.hp -= damage;
  if (ref.hp <= 0) {
    ref.alive = false;
    score += ref.score;
    const colors = targetType === "ground"
      ? ["#6f6", "#afa", "#fff", "#f80", "#ff0"]
      : ["#6f6", "#afa", "#fff", "#0f0", "#ff0"];
    addBurst(hitX, hitY, 10, colors);
    tryDropPowerUp(hitX, hitY);
  } else {
    addBurst(hitX, hitY, 5, ["#6f6", "#afa", "#fff"]);
  }
}

function damageAirEnemyFromRadLaser(enemy, hitX, hitY, damage) {
  if (!enemy.alive) return;
  enemy.hp -= damage;
  if (enemy.hp <= 0) {
    enemy.alive = false;
    score += enemy.score;
    addBurst(hitX, hitY, 10, ["#ff0", "#fa0", "#f80", "#fff", "#ffc080"]);
    tryDropPowerUp(hitX, hitY);
  } else {
    addBurst(hitX, hitY, 5, ["#fa0", "#f80", "#fff"]);
  }
}

function hasActiveXiLaser() {
  return zappers.some(b => b.type === "xiBeam");
}

function hasActiveRadLaser() {
  return zappers.some(b => b.type === "radLaser");
}

function getThinLaserOrigin(beamType) {
  const yOff = beamType === "xiBeam" ? 8 : 4;
  return { x: player.x + player.w / 2, y: player.y + yOff };
}

function findAirTargetsForRadLaser(limit) {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const targets = [];
  for (const e of airEnemies) {
    if (!e.alive) continue;
    const center = getAirEnemyCenter(e);
    targets.push({
      ref: e,
      x: center.x,
      y: center.y,
      dist: Math.hypot(center.x - cx, center.y - cy)
    });
  }
  targets.sort((a, b) => a.dist - b.dist);
  return targets.slice(0, limit);
}

function fireSingleXiLaser() {
  if (!player.xiMode || hasActiveXiLaser()) return;
  const targets = findXiLaserTargets(1);
  if (!targets.length) return;

  const origin = getThinLaserOrigin("xiBeam");
  const target = targets[0];
  const dist = Math.hypot(target.x - origin.x, target.y - origin.y);

  zappers.push({
    type: "xiBeam",
    x1: origin.x,
    y1: origin.y,
    x2: target.x,
    y2: target.y,
    progress: 0,
    travelSpeed: Math.min(0.75, 36 / Math.max(dist, 20)),
    targetType: target.targetType,
    targetRef: target.ref,
    damage: 4,
    hit: false,
    hitFlash: 0
  });
}

function fireSingleRadLaser() {
  if (player.airWeapon !== "radBeam" || (player.airWeaponLevel || 1) < 4) return;
  if (hasActiveRadLaser()) return;
  const targets = findAirTargetsForRadLaser(1);
  if (!targets.length) return;

  const origin = getThinLaserOrigin("radLaser");
  const target = targets[0];
  const dist = Math.hypot(target.x - origin.x, target.y - origin.y);
  const damage = getRadSpec(4).damage || 4;

  zappers.push({
    type: "radLaser",
    x1: origin.x,
    y1: origin.y,
    x2: target.x,
    y2: target.y,
    progress: 0,
    travelSpeed: Math.min(0.75, 36 / Math.max(dist, 20)),
    targetRef: target.ref,
    damage,
    hit: false,
    hitFlash: 0
  });
}

function tryFireRadLaser() {
  if (player.airWeapon !== "radBeam" || (player.airWeaponLevel || 1) < 4) return;
  if (player.airWeaponTimer <= 0 || player.xiMode) return;
  if (hasActiveRadLaser()) return;
  fireSingleRadLaser();
}

function tryFireXiLaser() {
  if (!player.xiMode || hasActiveXiLaser()) return;
  fireSingleXiLaser();
}

function updateThinLaser(b) {
  if (!b.hit) {
    const origin = getThinLaserOrigin(b.type);
    b.x1 = origin.x;
    b.y1 = origin.y;
    if (b.targetRef && b.targetRef.alive) {
      if (b.type === "radLaser") {
        const center = getAirEnemyCenter(b.targetRef);
        b.x2 = center.x;
        b.y2 = center.y;
      } else {
        const center = getXiLaserTargetCenter(b.targetType, b.targetRef);
        b.x2 = center.x;
        b.y2 = center.y;
      }
    }
    b.progress += b.travelSpeed;
    if (b.progress >= 1) {
      b.progress = 1;
      b.hit = true;
      b.hitFlash = 4;
      if (b.targetRef && b.targetRef.alive) {
        const damage = b.damage || 4;
        if (b.type === "radLaser") {
          damageAirEnemyFromRadLaser(b.targetRef, b.x2, b.y2, damage);
        } else {
          damageTargetFromXiLaser(b.targetType, b.targetRef, b.x2, b.y2, damage);
        }
      }
    }
    return false;
  }

  b.hitFlash--;
  return b.hitFlash <= 0;
}

function clearThinBeams() {
  zappers = zappers.filter(b => b.type !== "xiBeam" && b.type !== "radLaser");
}

function fireZapper() {
  if (shootCooldown > 0) return;
  const cx = player.x + player.w / 2;
  if (player.xiMode) {
    return;
  } else if (player.airWeapon === "radBeam") {
    const level = player.airWeaponLevel || 1;
    if (level >= 4) return;
    const spec = getRadSpec(level);
    for (const beam of spec.beams) {
      zappers.push({
        x: cx + beam.ox - beam.w / 2,
        y: player.y + beam.oy,
        w: beam.w,
        h: beam.h,
        speed: beam.speed,
        type: "rad",
        pierce: spec.pierce,
        damage: beam.damage,
        level
      });
    }
    shootCooldown = spec.cooldown;
  } else {
    zappers.push({
      x: cx - 2,
      y: player.y,
      w: 4,
      h: 12,
      speed: 9,
      type: "normal",
      pierce: false,
      damage: 1
    });
    shootCooldown = 5;
  }
}

function fireBlaster() {
  if (bombCooldown > 0 || player.xiMode) return;
  const cx = player.x + player.w / 2;
  if (player.groundWeapon === "flame") {
    const spread = 3;
    const count = 3;
    for (let n = 0; n < count; n++) {
      const t = count === 1 ? 0 : (n / (count - 1)) * 2 - 1;
      flames.push({
        x: cx - 8 + t * spread * 4,
        y: player.y + player.h - 4,
        w: 12,
        h: 16,
        vx: t * 1.8 + (Math.random() - 0.5) * 0.8,
        vy: 7 + Math.random() * 2,
        life: 28,
        damage: 2,
        hitIds: new Set()
      });
    }
    bombCooldown = 3;
  } else {
    blasters.push({
      x: cx - 3,
      y: player.y + player.h,
      w: 6,
      h: 6,
      vx: 2,
      vy: 5,
      speed: 6
    });
    bombCooldown = 12;
  }
}

function resetPlayerWeapons() {
  player.airWeapon = "normal";
  player.airWeaponLevel = 0;
  player.groundWeapon = "normal";
  player.airWeaponTimer = 0;
  player.groundWeaponTimer = 0;
  player.missileWeaponTimer = 0;
  player.missileLaunchTimer = 0;
  player.missileLevel = 0;
  player.xiMode = false;
  player.xiModeTimer = 0;
  player.xiTransformFrame = 0;
  player.microMissileTimer = 0;
  player.w = FIGHTER_SIZE.w;
  player.h = FIGHTER_SIZE.h;
  clearThinBeams();
}

function applyXiItem(burstX, burstY) {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  player.xiMode = true;
  player.xiModeTimer = XI_DURATION;
  player.xiTransformFrame = 0;
  player.microMissileTimer = 0;
  player.w = XI_SIZE.w;
  player.h = XI_SIZE.h;
  player.x = Math.max(8, Math.min(W - player.w - 8, cx - player.w / 2));
  player.y = Math.max(H * 0.35, Math.min(H - player.h - 8, cy - player.h / 2));
  player.barrier = XI_BARRIER;
  player.barrierFlash = 36;
  missiles = [];
  flames = [];
  blasters = [];
  tryFireXiLaser();
  addBurst(burstX, burstY, 28, ["#fff", "#e8eaef", "#59d7ff", "#ffd040", "#40ff80"]);
}

function exitXiMode() {
  clearThinBeams();
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  player.xiMode = false;
  player.xiModeTimer = 0;
  player.xiTransformFrame = 0;
  player.microMissileTimer = 0;
  player.w = FIGHTER_SIZE.w;
  player.h = FIGHTER_SIZE.h;
  player.x = Math.max(8, Math.min(W - player.w - 8, cx - player.w / 2));
  player.y = Math.max(H * 0.35, Math.min(H - player.h - 8, cy - player.h / 2));
  player.missileLevel = 0;
  player.missileWeaponTimer = 0;
  player.missileLaunchTimer = 0;
  player.airWeapon = "normal";
  player.airWeaponLevel = 0;
  player.airWeaponTimer = 0;
  player.groundWeapon = "normal";
  player.groundWeaponTimer = 0;
  player.barrier = Math.min(MAX_BARRIER, player.barrier);
  addBurst(cx, cy, 14, ["#8cf", "#adf", "#e8eaef", "#fff"]);
}

function applyFunnelMissileItem(level) {
  player.missileLevel = Math.max(player.missileLevel || 0, level);
  player.missileWeaponTimer = WEAPON_DURATION;
  player.missileLaunchTimer = 0;
  launchFunnelMissiles();
}

function findHomingTarget(fromX, fromY) {
  let best = null;
  let bestDist = Infinity;
  for (const e of airEnemies) {
    if (!e.alive) continue;
    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;
    const d = Math.hypot(cx - fromX, cy - fromY);
    if (d < bestDist) {
      bestDist = d;
      best = { type: "air", ref: e };
    }
  }
  for (const g of groundTargets) {
    if (!g.alive) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < -40 || sy > H + 40) continue;
    const cx = g.x + g.w / 2;
    const cy = sy + g.h / 2;
    const d = Math.hypot(cx - fromX, cy - fromY);
    if (d < bestDist) {
      bestDist = d;
      best = { type: "ground", ref: g };
    }
  }
  return best;
}

function getHomingTargetPos(m) {
  if (!m.targetRef || !m.targetRef.alive) return null;
  if (m.targetType === "air") {
    return { x: m.targetRef.x + m.targetRef.w / 2, y: m.targetRef.y + m.targetRef.h / 2 };
  }
  const sy = worldToScreen(m.targetRef.worldY);
  return { x: m.targetRef.x + m.targetRef.w / 2, y: sy + m.targetRef.h / 2 };
}

function launchFunnelMissile(launchX, launchY, level) {
  const spec = getFunnelSpec(level);
  const target = findHomingTarget(launchX, launchY);
  missiles.push({
    x: launchX - 4,
    y: launchY,
    w: 8,
    h: 14,
    vx: 0,
    vy: spec.vy,
    speed: spec.speed,
    turnRate: spec.turnRate,
    targetType: target ? target.type : null,
    targetRef: target ? target.ref : null,
    damage: spec.damage,
    level,
    kind: "funnel",
    life: 220
  });
}

function launchFunnelMissiles() {
  const level = player.missileLevel || 1;
  const spec = getFunnelSpec(level);
  const cy = player.y + (player.xiMode ? 10 : 8);
  for (let i = 0; i < spec.count; i++) {
    const t = spec.count === 1 ? 0.5 : i / (spec.count - 1);
    const launchX = player.x + 4 + t * (player.w - 8);
    launchFunnelMissile(launchX, cy, level);
  }
}

function launchMicroMissiles() {
  if (!player.xiMode) return;
  const launchPoints = [
    { x: player.x - 2, y: player.y + player.h * 0.28 },
    { x: player.x + player.w + 2, y: player.y + player.h * 0.28 },
    { x: player.x + player.w * 0.18, y: player.y + player.h - 10 },
    { x: player.x + player.w * 0.82, y: player.y + player.h - 10 },
    { x: player.x + player.w * 0.5, y: player.y + player.h * 0.12 }
  ];
  for (const pt of launchPoints) {
    for (let i = 0; i < 4; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.1;
      const speed = 9 + Math.random() * 5;
      const target = findHomingTarget(pt.x, pt.y);
      missiles.push({
        x: pt.x - 2,
        y: pt.y,
        w: 4,
        h: 6,
        vx: Math.cos(angle) * speed * 0.35,
        vy: Math.sin(angle) * speed,
        speed: speed + 5,
        turnRate: 0.3,
        targetType: target ? target.type : null,
        targetRef: target ? target.ref : null,
        damage: 1,
        level: 0,
        kind: "micro",
        life: 150
      });
    }
  }
}

function destroyEnemyFromMissile(e, x, y) {
  e.alive = false;
  score += e.score;
  addBurst(x, y, 12, ["#ff0", "#fa0", "#f8a", "#fff"]);
  tryDropPowerUp(x, y);
}

function destroyGroundFromMissile(g, sy) {
  g.alive = false;
  score += g.score;
  addBurst(g.x + g.w / 2, sy + g.h / 2, 14, ["#f80", "#ff0", "#f8a", "#fff"]);
  tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
}

function takePlayerHit() {
  if (player.invincibleTimer > 0) return;
  if (player.barrier > 0) {
    player.barrier--;
    player.barrierFlash = 20;
    addBurst(
      player.x + player.w / 2,
      player.y + player.h / 2,
      16,
      ["#8cf", "#adf", "#fff", "#59d7ff"]
    );
    return;
  }
  lives--;
  startPlayerExplosion();
}

function startPlayerExplosion() {
  resetPlayerWeapons();
  player.barrier = 0;
  player.barrierFlash = 0;
  player.invincibleTimer = 0;
  legendFadeTimer = 0;
  missiles = [];
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const particles = [];
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 4,
      life: 20 + Math.floor(Math.random() * 18),
      color: ["#ff0", "#fa0", "#f60", "#0ff"][Math.floor(Math.random() * 4)]
    });
  }
  explosion = { cx, cy, frame: 0, duration: 45, particles };
}


function addBurst(x, y, n, colors) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 3,
      life: 14 + Math.floor(Math.random() * 10),
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

let burstParticles = [];

function updateExplosion() {
  if (explosion) {
    explosion.frame++;
    for (const p of explosion.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life--;
    }
    explosion.particles = explosion.particles.filter(p => p.life > 0);
    if (explosion.frame >= explosion.duration) {
      explosion = null;
      if (lives <= 0) {
        gameOver = true;
      } else {
        player.x = W / 2 - FIGHTER_SIZE.w / 2;
        player.y = H - 70;
        player.w = FIGHTER_SIZE.w;
        player.h = FIGHTER_SIZE.h;
        player.bank = 0;
        player.afterburner = 0;
        player.afterburnerFrame = 0;
        resetLegendFade();
      }
    }
  }

  updateLegendFade();
  updateBurstParticles();
}

function updateBurstParticles() {
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) burstParticles.splice(i, 1);
  }
}

function updatePlayerBank() {
  const maxBank = 0.38;
  let target = 0;
  if (keys.ArrowLeft) target = -maxBank;
  else if (keys.ArrowRight) target = maxBank;
  player.bank += (target - player.bank) * 0.14;
}

function updatePlayerAfterburner() {
  const target = keys.ArrowUp ? 1 : 0;
  player.afterburner += (target - player.afterburner) * 0.18;
  if (player.afterburner > 0.04) player.afterburnerFrame++;
  else player.afterburnerFrame = 0;
}

function update() {
  if (explosion) {
    updateExplosion();
    return;
  }
  if (gameOver) return;
  if (paused) return;
  updateBurstParticles();
  updateLegendFade();

  if (wildfireItemDelayTimer > 0) {
    wildfireItemDelayTimer--;
    if (wildfireItemDelayTimer === 0) {
      spawnPowerUp(player.x + player.w / 2, player.y - 52, "wildfire");
    }
  }
  if (xiItemDelayTimer > 0) {
    xiItemDelayTimer--;
    if (xiItemDelayTimer === 0) {
      spawnPowerUp(player.x + player.w / 2, player.y - 72, "xi");
    }
  }

  const groundScroll = SCROLL_SPEED + wave * 0.05;
  scrollY += groundScroll;

  if (keys.ArrowLeft) player.x = Math.max(8, player.x - player.speed);
  if (keys.ArrowRight) player.x = Math.min(W - player.w - 8, player.x + player.speed);
  if (keys.ArrowUp) player.y = Math.max(H * 0.35, player.y - player.speed);
  if (keys.ArrowDown) player.y = Math.min(H - player.h - 8, player.y + player.speed);
  updatePlayerBank();
  updatePlayerAfterburner();

  if (shootCooldown > 0) shootCooldown--;
  if (bombCooldown > 0) bombCooldown--;
  if (player.xiMode) {
    player.xiModeTimer--;
    player.xiTransformFrame++;
    if (player.xiModeTimer <= 0) {
      exitXiMode();
    } else {
      tryFireXiLaser();
    }
  } else {
    if (player.airWeaponTimer > 0) {
      player.airWeaponTimer--;
      if (player.airWeaponTimer <= 0) {
        player.airWeapon = "normal";
        player.airWeaponLevel = 0;
      }
    }
    if (player.groundWeaponTimer > 0) {
      player.groundWeaponTimer--;
      if (player.groundWeaponTimer <= 0) player.groundWeapon = "normal";
    }
    if (player.missileWeaponTimer > 0) {
      player.missileWeaponTimer--;
      player.missileLaunchTimer++;
      const funnelSpec = getFunnelSpec(player.missileLevel);
      if (player.missileLaunchTimer >= funnelSpec.interval) {
        player.missileLaunchTimer = 0;
        launchFunnelMissiles();
      }
    } else {
      player.missileLevel = 0;
    }
    if (player.airWeapon === "radBeam" && (player.airWeaponLevel || 1) >= 4 && player.airWeaponTimer > 0) {
      tryFireRadLaser();
    } else if (keys.Space) {
      fireZapper();
    }
    if (keys.KeyX) fireBlaster();
  }
  if (player.barrierFlash > 0) player.barrierFlash--;
  if (player.invincibleTimer > 0) player.invincibleTimer--;
  updateWildfire();

  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += groundScroll;
    item.timer++;
    item.life--;
    if (item.life <= 0 || item.y > H + 24) {
      items.splice(i, 1);
      continue;
    }
    if (rectsOverlap(item.x, item.y, item.w, item.h, player.x, player.y, player.w, player.h)) {
      collectPowerUp(item);
      items.splice(i, 1);
    }
  }

  spawnTimer++;
  const spawnRate = Math.max(25, 55 - wave * 3);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    spawnAirEnemy();
    if (wave >= 2 && Math.random() < 0.4) spawnAirEnemy();
  }

  groundSpawnTimer++;
  if (groundSpawnTimer >= 58) {
    groundSpawnTimer = 0;
    const spawnChance = wildfire ? 0.35 : 0.88;
    if (Math.random() < spawnChance) {
      spawnGroundTarget(-scrollY - 90 - Math.random() * 80);
    }
  }

  for (let i = zappers.length - 1; i >= 0; i--) {
    const b = zappers[i];
    if (b.type === "xiBeam" || b.type === "radLaser") {
      if (updateThinLaser(b)) {
        zappers.splice(i, 1);
        if (b.type === "xiBeam" && player.xiMode) fireSingleXiLaser();
        else if (b.type === "radLaser" && player.airWeapon === "radBeam" && (player.airWeaponLevel || 1) >= 4) {
          fireSingleRadLaser();
        }
      }
      continue;
    }
    b.y -= b.speed;
    if (b.y + b.h < 0) { zappers.splice(i, 1); continue; }

    let hit = false;
    for (const e of airEnemies) {
      if (!e.alive) continue;
      const sy = e.y;
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, sy, e.w, e.h)) {
        e.hp -= b.damage || 1;
        hit = true;
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 12, ["#ff0", "#fa0", "#fff", "#8f8"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
        if (!b.pierce) break;
      }
    }
    if (hit && !b.pierce) zappers.splice(i, 1);
  }

  for (let i = blasters.length - 1; i >= 0; i--) {
    const b = blasters[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H || b.x < 0 || b.x > W) { blasters.splice(i, 1); continue; }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      if (rectsOverlap(b.x, b.y, b.w, b.h, g.x, sy, g.w, g.h)) {
        g.hp--;
        blasters.splice(i, 1);
        if (g.hp <= 0) {
          g.alive = false;
          score += g.score;
          addBurst(g.x + g.w / 2, sy + g.h / 2, 14, ["#f80", "#ff0", "#fff"]);
          tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
        }
        break;
      }
    }

    for (const e of airEnemies) {
      if (!e.alive) continue;
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp--;
        blasters.splice(i, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 10, ["#ff0", "#fa0"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
        break;
      }
    }
  }

  for (let i = flames.length - 1; i >= 0; i--) {
    const f = flames[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.08;
    f.life--;
    if (f.life <= 0 || f.y > H + 20 || f.x < -20 || f.x > W + 20) {
      flames.splice(i, 1);
      continue;
    }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      const gid = "g" + g.worldY + ":" + g.x;
      if (f.hitIds.has(gid)) continue;
      if (rectsOverlap(f.x, f.y, f.w, f.h, g.x, sy, g.w, g.h)) {
        f.hitIds.add(gid);
        g.hp -= f.damage;
        if (g.hp <= 0) {
          g.alive = false;
          score += g.score;
          addBurst(g.x + g.w / 2, sy + g.h / 2, 16, ["#f80", "#ff0", "#fff", "#f60"]);
          tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
        }
      }
    }

    for (const e of airEnemies) {
      if (!e.alive) continue;
      const eid = "e" + e.x + ":" + e.y;
      if (f.hitIds.has(eid)) continue;
      if (rectsOverlap(f.x, f.y, f.w, f.h, e.x, e.y, e.w, e.h)) {
        f.hitIds.add(eid);
        e.hp -= f.damage;
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 12, ["#ff0", "#fa0", "#f60"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
      }
    }
  }

  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    let pos = getHomingTargetPos(m);
    if (!pos) {
      const next = findHomingTarget(m.x + m.w / 2, m.y + m.h / 2);
      if (next) {
        m.targetType = next.type;
        m.targetRef = next.ref;
        pos = getHomingTargetPos(m);
      }
    }

    const mx = m.x + m.w / 2;
    const my = m.y + m.h / 2;
    const aimX = pos ? pos.x : mx;
    const aimY = pos ? pos.y : my - 80;
    const desired = Math.atan2(aimY - my, aimX - mx);
    let current = Math.atan2(m.vy, m.vx);
    if (Math.hypot(m.vx, m.vy) < 0.2) current = -Math.PI / 2;
    let delta = desired - current;
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    const turned = current + Math.max(-m.turnRate, Math.min(m.turnRate, delta));
    m.vx = Math.cos(turned) * m.speed;
    m.vy = Math.sin(turned) * m.speed;
    m.x += m.vx;
    m.y += m.vy;
    m.life--;
    if (m.life <= 0 || m.x < -24 || m.x > W + 24 || m.y < -40 || m.y > H + 40) {
      missiles.splice(i, 1);
      continue;
    }

    let hit = false;
    for (const e of airEnemies) {
      if (!e.alive) continue;
      if (rectsOverlap(m.x, m.y, m.w, m.h, e.x, e.y, e.w, e.h)) {
        e.hp -= m.damage;
        hit = true;
        if (e.hp <= 0) destroyEnemyFromMissile(e, e.x + e.w / 2, e.y + e.h / 2);
        break;
      }
    }
    if (hit) {
      missiles.splice(i, 1);
      continue;
    }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      if (rectsOverlap(m.x, m.y, m.w, m.h, g.x, sy, g.w, g.h)) {
        g.hp -= m.damage;
        if (g.hp <= 0) destroyGroundFromMissile(g, sy);
        missiles.splice(i, 1);
        break;
      }
    }
  }

  for (const e of airEnemies) {
    if (!e.alive) continue;
    e.y += e.speedY;
    if (e.pattern === "sine") {
      e.x = e.baseX + Math.sin(e.y * 0.04 + e.phase) * 60;
    } else if (e.pattern === "dive") {
      e.x += Math.sin(e.phase + e.y * 0.02) * 2.5;
    }
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 20 && e.y < H - LEGEND_AREA_H) {
      enemyBullets.push({
        kind: "air",
        x: e.x + e.w / 2 - 2,
        y: e.y + e.h,
        w: 4,
        h: 8,
        speed: 3.5 + wave * 0.2
      });
      e.shootTimer = 80 + Math.floor(Math.random() * 60);
    }
  }
  airEnemies = airEnemies.filter(e => e.alive && e.y < H + 40);

  for (const g of groundTargets) {
    if (!g.alive || !g.fireCooldown) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < 20 || sy > H - 20) continue;
    g.fireCooldown--;
    if (g.fireCooldown <= 0) {
      const cx = g.x + g.w / 2;
      const cy = sy + g.h * 0.35;
      const dx = player.x + player.w / 2 - cx;
      const dy = player.y + player.h / 2 - cy;
      const len = Math.hypot(dx, dy) || 1;
      const speed = g.type === "giantFortress" ? 1.15 : 1.35;
      enemyBullets.push({
        kind: "ground",
        x: cx - 6,
        y: cy - 10,
        w: 12,
        h: 20,
        vx: dx / len * speed,
        vy: dy / len * speed
      });
      g.fireCooldown = (g.type === "giantFortress" ? 70 : 95) - Math.min(wave * 4, 28);
    }
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx || 0;
    b.y += b.vy === undefined ? b.speed : b.vy;
    if (b.y > H || b.y + b.h < 0 || b.x > W || b.x + b.w < 0) { enemyBullets.splice(i, 1); continue; }
    if (rectsOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
      enemyBullets.splice(i, 1);
      takePlayerHit();
    }
  }

  if (score >= wave * 2000) wave++;

  groundTargets = groundTargets.filter(g => {
    if (!g.alive) return false;
    const sy = worldToScreen(g.worldY);
    return sy < H + 60;
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const NAZCA_SITES = [
  { kind: "condor", worldY: -220, x: 310, scale: 1.55, rot: 0.04 },
  { kind: "spider", worldY: 480, x: 400, scale: 1.45, rot: -0.06 },
  { kind: "monkey", worldY: 1140, x: 150, scale: 1.38, rot: 0.1 },
  { kind: "spiral", worldY: 1780, x: 330, scale: 1.62, rot: 0 },
  { kind: "trapezoid", worldY: 2420, x: 290, scale: 1.32, rot: -0.05 },
  { kind: "condor", worldY: 3060, x: 220, scale: 1.48, rot: -0.08 }
];
const NAZCA_CYCLE = 3600;

function nazcaPath(kind) {
  const p = new Path2D();
  if (kind === "condor") {
    p.moveTo(102, 6);
    p.lineTo(138, 4);
    p.lineTo(46, 10);
    p.quadraticCurveTo(14, 14, 2, 30);
    p.quadraticCurveTo(-14, 52, -32, 38);
    p.lineTo(-78, -4);
    p.lineTo(-62, -58);
    p.lineTo(-18, -38);
    p.lineTo(28, -24);
    p.quadraticCurveTo(62, -14, 78, 6);
    p.lineTo(92, 28);
    p.lineTo(72, 48);
    p.lineTo(38, 36);
    p.lineTo(16, 20);
    p.closePath();
    p.moveTo(2, 30);
    p.lineTo(22, 54);
    p.lineTo(44, 40);
    p.lineTo(16, 20);
  } else if (kind === "spider") {
    p.ellipse(0, 12, 22, 32, 0, 0, Math.PI * 2);
    p.moveTo(0, -28);
    p.arc(0, -28, 14, 0, Math.PI * 2);
    p.moveTo(-8, -8);
    p.lineTo(-58, -48);
    p.moveTo(8, -8);
    p.lineTo(62, -38);
    p.moveTo(-14, 4);
    p.lineTo(-72, 8);
    p.moveTo(14, 4);
    p.lineTo(78, 18);
    p.moveTo(-12, 22);
    p.lineTo(-68, 58);
    p.moveTo(12, 22);
    p.lineTo(70, 62);
    p.moveTo(0, 36);
    p.lineTo(0, 88);
    p.moveTo(-6, 40);
    p.lineTo(-24, 82);
    p.moveTo(6, 40);
    p.lineTo(26, 84);
  } else if (kind === "monkey") {
    p.moveTo(-18, -52);
    p.lineTo(-18, -18);
    p.lineTo(-42, 8);
    p.moveTo(-18, -18);
    p.lineTo(8, -48);
    p.moveTo(-18, -18);
    p.lineTo(-8, 18);
    p.lineTo(-28, 52);
    p.moveTo(-8, 18);
    p.lineTo(18, 48);
    p.moveTo(-8, 18);
    p.quadraticCurveTo(32, 28, 58, 8);
    p.quadraticCurveTo(82, -18, 72, -48);
    p.quadraticCurveTo(58, -72, 28, -62);
    p.quadraticCurveTo(2, -48, -8, -18);
  } else if (kind === "trapezoid") {
    p.moveTo(-48, 42);
    p.lineTo(-28, -38);
    p.lineTo(28, -38);
    p.lineTo(48, 42);
    p.closePath();
    p.moveTo(-20, 18);
    p.lineTo(0, -18);
    p.lineTo(20, 18);
    p.moveTo(-32, 0);
    p.lineTo(32, 0);
    p.moveTo(0, -38);
    p.lineTo(0, 42);
  } else {
    for (let a = 0; a <= Math.PI * 5.2; a += 0.08) {
      const r = 6 + a * 9.5;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (a === 0) p.moveTo(px, py);
      else p.lineTo(px, py);
    }
  }
  return p;
}

function drawSacredNazca(cx, cy, kind, scale, rotation) {
  const path = nazcaPath(kind);
  const reach = kind === "spiral" ? 240 : kind === "condor" ? 220 : 195;
  const aura = reach * scale;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.scale(scale, scale);

  const halo = ctx.createRadialGradient(0, 0, aura * 0.1, 0, 0, aura * 1.15);
  halo.addColorStop(0, "rgba(220, 205, 155, 0.11)");
  halo.addColorStop(0.35, "rgba(180, 150, 95, 0.07)");
  halo.addColorStop(0.7, "rgba(120, 92, 56, 0.03)");
  halo.addColorStop(1, "rgba(200, 160, 100, 0)");
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 1.05, aura * 0.82, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(112, 93, 56, 0.08)";
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 0.72, aura * 0.56, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(220, 198, 140, 0.06)";
  ctx.lineWidth = 1.4;
  ctx.setLineDash([10, 14]);
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 0.88, aura * 0.68, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.strokeStyle = "rgba(31, 24, 13, 0.18)";
  ctx.lineWidth = 18;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(104, 82, 50, 0.32)";
  ctx.lineWidth = 12;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(170, 148, 92, 0.38)";
  ctx.lineWidth = 6;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(232, 220, 168, 0.16)";
  ctx.lineWidth = 1.6;
  ctx.stroke(path);

  ctx.restore();
}

function drawNazcaField() {
  for (const site of NAZCA_SITES) {
    for (let rep = -1; rep <= 2; rep++) {
      const sy = worldToScreen(site.worldY + rep * NAZCA_CYCLE);
      if (sy < -280 || sy > H + 280) continue;
      drawSacredNazca(site.x, sy, site.kind, site.scale, site.rot);
    }
  }
}

function terrainRand(seed) {
  const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

function drawAerialRoad(points, width) {
  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.strokeStyle = "rgba(38, 25, 14, 0.42)";
  ctx.lineWidth = width + 7;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length - 2; i += 3) {
    ctx.bezierCurveTo(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y, points[i + 2].x, points[i + 2].y);
  }
  ctx.stroke();

  ctx.strokeStyle = "rgba(126, 101, 66, 0.78)";
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length - 2; i += 3) {
    ctx.bezierCurveTo(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y, points[i + 2].x, points[i + 2].y);
  }
  ctx.stroke();

  ctx.strokeStyle = "rgba(212, 188, 127, 0.2)";
  ctx.lineWidth = 1.2;
  for (const offset of [-width * 0.22, width * 0.22]) {
    ctx.save();
    ctx.translate(offset, 0);
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length - 2; i += 3) {
      ctx.bezierCurveTo(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y, points[i + 2].x, points[i + 2].y);
    }
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawAerialForest(burning) {
  const tileH = 210;
  const firstBand = Math.floor(-scrollY / tileH) - 1;
  const lastBand = Math.ceil((H + 60 - scrollY) / tileH) + 1;
  for (let worldBand = firstBand; worldBand <= lastBand; worldBand++) {
    const y = worldToScreen(worldBand * tileH) - 60;
    const forestBias = terrainRand(worldBand + 4.7);
    const centerX = forestBias < 0.5 ? W * 0.24 : W * 0.72;
    const bandW = 170 + terrainRand(worldBand + 8.1) * 190;
    const bandH = 90 + terrainRand(worldBand + 9.3) * 80;

    ctx.save();
    ctx.beginPath();
    ctx.ellipse(centerX, y + 80, bandW, bandH, terrainRand(worldBand) * 0.7 - 0.35, 0, Math.PI * 2);
    ctx.clip();

    const leafBase = burning ? ["#160d08", "#211006", "#2d1608"] : ["#15321b", "#1f4324", "#2e542b"];
    for (let i = 0; i < 58; i++) {
      const seed = worldBand * 100 + i;
      const x = centerX - bandW + terrainRand(seed) * bandW * 2;
      const cy = y + 80 - bandH + terrainRand(seed + 1.9) * bandH * 2;
      const r = 7 + terrainRand(seed + 2.7) * 11;
      ctx.fillStyle = leafBase[i % leafBase.length];
      ctx.beginPath();
      ctx.arc(x, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = burning ? "rgba(5, 3, 2, 0.28)" : "rgba(4, 12, 5, 0.24)";
      ctx.beginPath();
      ctx.arc(x + r * 0.25, cy + r * 0.2, r * 0.64, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawAerialRocks() {
  const rocks = [
    { x: 250, worldY: 82, r: 24, seed: 2 },
    { x: 435, worldY: 170, r: 21, seed: 4 },
    { x: 370, worldY: 310, r: 29, seed: 7 },
    { x: 170, worldY: 385, r: 23, seed: 11 },
    { x: 520, worldY: 425, r: 20, seed: 13 }
  ];
  const rockCycle = H + 120;
  for (let rep = -1; rep <= 2; rep++) {
    for (const rock of rocks) {
      const y = worldToScreen(rep * rockCycle + rock.worldY);
      if (y < -80 || y > H + 80) continue;
      const x = rock.x + Math.sin((rep * rockCycle + rock.worldY) * 0.002 + rock.seed) * 18;
    const r = rock.r;

    ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
    ctx.beginPath();
    ctx.ellipse(x + r * 0.95, y + r * 0.9, r * 1.15, r * 0.32, 0.72, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, 2, x, y, r * 1.15);
    grad.addColorStop(0, "#b8b7a8");
    grad.addColorStop(0.46, "#77796b");
    grad.addColorStop(1, "#3d4038");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y, r * 0.9, r * 0.68, terrainRand(rock.seed) * 0.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255, 255, 230, 0.14)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.35, y - r * 0.22);
    ctx.lineTo(x + r * 0.18, y - r * 0.36);
    ctx.lineTo(x + r * 0.48, y + r * 0.06);
    ctx.stroke();
    }
  }
}

function drawBackground() {
  const burning = wildfire && wildfire.timer > 0;
  const burnRatio = burning ? wildfire.timer / WILDFIRE_DURATION : 0;

  const grass = ctx.createLinearGradient(0, 0, 0, H);
  if (burning) {
    grass.addColorStop(0, "#2f2618");
    grass.addColorStop(0.45, "#3c2415");
    grass.addColorStop(1, "#26100a");
  } else {
    grass.addColorStop(0, "#283f24");
    grass.addColorStop(0.36, "#405d31");
    grass.addColorStop(0.72, "#53653a");
    grass.addColorStop(1, "#354726");
  }
  ctx.fillStyle = grass;
  ctx.fillRect(0, 0, W, H);

  const patchCycle = H + 160;
  ctx.fillStyle = burning ? "rgba(82, 42, 18, 0.32)" : "rgba(114, 124, 63, 0.28)";
  for (let rep = -1; rep <= 2; rep++) {
    for (let i = 0; i < 10; i++) {
      const seed = i + rep * 13;
      const y = worldToScreen(rep * patchCycle + i * 96 - 70);
      if (y < -100 || y > H + 50) continue;
      const x = 18 + terrainRand(seed) * (W - 150);
      roundRect(x, y, 96 + terrainRand(seed + 2.2) * 92, 34 + terrainRand(seed + 3.1) * 24, 18);
      ctx.fill();
    }
  }

  ctx.strokeStyle = burning ? "rgba(120, 76, 34, 0.18)" : "rgba(194, 205, 120, 0.16)";
  ctx.lineWidth = 0.9;
  for (let y = (scrollY % 34) - 34; y < H; y += 34) {
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(y * 0.04) * 5);
    ctx.bezierCurveTo(W * 0.24, y + 12, W * 0.68, y - 10, W, y + 4);
    ctx.stroke();
  }

  drawAerialRoads();

  drawNazcaField();
  drawAerialForest(burning);
  drawAerialRocks();

  ctx.strokeStyle = burning ? "rgba(225, 118, 38, 0.2)" : "rgba(225, 206, 130, 0.16)";
  ctx.lineWidth = 1.5;
  for (let y = (scrollY % 58) - 58; y < H; y += 58) {
    const phase = (y - scrollY) * 0.017;
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(phase) * 10);
    ctx.lineTo(W, y + 20 + Math.cos(phase) * 8);
    ctx.stroke();
  }

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const flareCycle = H + 90;
  for (let rep = -1; rep <= 2; rep++) {
    for (let i = 0; i < 9; i++) {
      const seed = i * 19 + rep * 11;
      const x = 70 + terrainRand(seed) * (W - 140);
      const y = worldToScreen(rep * flareCycle + terrainRand(seed + 5.4) * H - 45);
      if (y < -60 || y > H + 60) continue;
    const flare = ctx.createRadialGradient(x, y, 0, x, y, 18 + terrainRand(seed + 1.2) * 20);
    flare.addColorStop(0, "rgba(255, 224, 135, 0.2)");
    flare.addColorStop(0.25, "rgba(255, 140, 55, 0.08)");
    flare.addColorStop(1, "rgba(255, 120, 30, 0)");
    ctx.fillStyle = flare;
    ctx.beginPath();
    ctx.arc(x, y, 36, 0, Math.PI * 2);
    ctx.fill();
    }
  }
  ctx.restore();

  const vignette = ctx.createRadialGradient(W * 0.48, H * 0.42, H * 0.18, W * 0.5, H * 0.5, H * 0.78);
  vignette.addColorStop(0, "rgba(255, 255, 220, 0.03)");
  vignette.addColorStop(0.68, "rgba(0, 0, 0, 0.05)");
  vignette.addColorStop(1, "rgba(0, 0, 0, 0.32)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "rgba(190, 230, 190, 0.035)";
  ctx.fillRect(0, 0, W, H);

  if (burning) {
    const burnGlow = Math.min(1, burnRatio * 1.2 + (wildfire.frame < 40 ? (40 - wildfire.frame) / 40 : 0));
    const smoke = ctx.createLinearGradient(0, H * 0.15, 0, H);
    smoke.addColorStop(0, `rgba(120, 50, 10, ${0.12 * burnGlow})`);
    smoke.addColorStop(0.4, `rgba(180, 60, 8, ${0.24 * burnGlow})`);
    smoke.addColorStop(0.72, `rgba(100, 25, 0, ${0.32 * burnGlow})`);
    smoke.addColorStop(1, `rgba(30, 8, 0, ${0.42 * burnGlow})`);
    ctx.fillStyle = smoke;
    ctx.fillRect(0, H * 0.15, W, H * 0.85);
  }
}

function drawAfterburner(sx, sy, intensity, frame) {
  const flicker = 0.78 + Math.sin(frame * 0.55) * 0.14 + Math.sin(frame * 1.35) * 0.08;
  const len = (11 + Math.sin(frame * 0.85) * 3.5) * sy * intensity * flicker;
  const halfW = (2.6 + Math.sin(frame * 0.65) * 0.55) * sx * intensity;
  const nozzleY = 13.2 * sy;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  const grad = ctx.createRadialGradient(0, nozzleY, 0, 0, nozzleY + len * 0.45, len * 0.95);
  grad.addColorStop(0, `rgba(255, 255, 230, ${0.95 * intensity})`);
  grad.addColorStop(0.22, `rgba(255, 195, 50, ${0.88 * intensity})`);
  grad.addColorStop(0.55, `rgba(255, 90, 25, ${0.55 * intensity})`);
  grad.addColorStop(1, "rgba(255, 50, 0, 0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-halfW, nozzleY);
  ctx.quadraticCurveTo(-halfW * 1.7, nozzleY + len * 0.5, 0, nozzleY + len);
  ctx.quadraticCurveTo(halfW * 1.7, nozzleY + len * 0.5, halfW, nozzleY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = `rgba(255, 248, 210, ${0.92 * intensity})`;
  ctx.beginPath();
  ctx.ellipse(0, nozzleY + 0.5 * sy, halfW * 0.5, 2 * sy, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `rgba(255, 120, 30, ${0.35 * intensity})`;
  for (let i = 0; i < 4; i++) {
    const px = Math.sin(frame * 0.4 + i * 2.1) * halfW * 0.9;
    const py = nozzleY + len * (0.35 + i * 0.14) + Math.sin(frame + i) * sy;
    ctx.beginPath();
    ctx.arc(px, py, (1.2 + (i % 2) * 0.6) * sx, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}
