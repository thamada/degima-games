<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲーム</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  display: flex;
  flex-direction: column;
}

.tab-bar {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  height: 36px;
  padding: 0 12px;
  background: #0a0a0a;
  border-bottom: 1px solid #1a1a1a;
}

.tabs {
  display: flex;
  gap: 2px;
  margin-left: auto;
}

.tab {
  position: relative;
  display: flex;
  align-items: center;
  padding: 6px 14px;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  background: #2b2d30;
  color: #888;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.03em;
  cursor: pointer;
  margin-bottom: -1px;
  transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}

.tab:hover:not(.active) {
  color: #bbb;
  background: #35373a;
}

.tab:focus-visible {
  outline: 1px solid #555;
  outline-offset: -1px;
}

.tab.active {
  background: #0a120a;
  border-color: #39ff14;
  border-bottom-color: #0a120a;
  color: #fff;
  text-shadow: 0 0 5px #00ff00, 0 0 10px rgba(0, 255, 0, 0.7);
  box-shadow:
    0 0 6px rgba(57, 255, 20, 0.25),
    inset 0 0 24px rgba(0, 255, 0, 0.04);
}

.panels {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  background: #000;
}

.panel {
  display: none;
  height: 100%;
}

.panel.active {
  display: block;
}

.panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: #000;
}
</style>
</head>
<body>
<header class="tab-bar">
  <nav class="tabs" role="tablist">
    <button type="button" class="tab" role="tab" aria-selected="false" data-target="invaders">インベーダー</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-target="pong">ポン</button>
    <button type="button" class="tab active" role="tab" aria-selected="true" data-target="mevius">メビウス</button>
  </nav>
</header>
<div class="panels">
  <div id="panel-invaders" class="panel" role="tabpanel">
    <iframe data-src="invaders.html" title="インベーダー"></iframe>
  </div>
  <div id="panel-pong" class="panel" role="tabpanel">
    <iframe data-src="pong.html" title="ポン"></iframe>
  </div>
  <div id="panel-mevius" class="panel active" role="tabpanel">
    <iframe src="mevius.html" title="メビウス"></iframe>
  </div>
</div>
<script>
const tabs = document.querySelectorAll(".tab");

function ensureIframeLoaded(panel) {
  const iframe = panel.querySelector("iframe");
  if (iframe.dataset.src && !iframe.src) {
    iframe.src = iframe.dataset.src;
  }
  return iframe;
}

function switchTab(target) {
  tabs.forEach((tab) => {
    const active = tab.dataset.target === target;
    tab.classList.toggle("active", active);
    tab.setAttribute("aria-selected", active);
  });

  document.querySelectorAll(".panel").forEach((panel) => {
    const active = panel.id === "panel-" + target;
    panel.classList.toggle("active", active);
    if (active) {
      ensureIframeLoaded(panel).focus();
    }
  });
}

tabs.forEach((tab) => {
  tab.addEventListener("click", () => switchTab(tab.dataset.target));
});
</script>
</body>
</html>
