<!DOCTYPE html><html><head><meta charset=UTF-8><title>ポン</title><style>html,body{height:100%;margin:0;overflow:hidden}body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;gap:4px;font-family:monospace;color:#0f0}canvas{border:2px solid #0f0;box-shadow:0 0 20px #0f0;max-width:100%;max-height:calc(100% - 1.25rem);width:auto;height:auto;display:block}#info{flex-shrink:0;font-size:11px;line-height:1.2;margin:0}</style></head><body><canvas id=c width=640 height=480></canvas><div id=info>↑↓ 移動 | R リスタート</div><script>const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");let paddleL,paddleR,ball,scoreL,scoreR,keys={},gameState="playing",particles=[],missTimer=0;const MISS_FRAMES=90;function init(){paddleL={x:20,y:200,w:10,h:80,speed:6,dissolving:false};paddleR={x:610,y:200,w:10,h:80,speed:5};ball={x:320,y:240,r:8,dx:4,dy:2*(Math.random()>0.5?1:-1),visible:true};scoreL=0;scoreR=0;gameState="playing";particles=[];missTimer=0;}function resetBall(){ball.x=320;ball.y=240;ball.dx=4*(Math.random()>0.5?1:-1);ball.dy=Math.random()*4-2;ball.visible=true;paddleL.dissolving=false;}function spawnExplosion(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*7;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.025+Math.random()*.035,size:2+Math.random()*5,color:Math.random()>.3?"#0f0":"#8f8",g:.08});}}function spawnDissolve(p){const n=50;for(let i=0;i<n;i++){particles.push({x:p.x+Math.random()*p.w,y:p.y+Math.random()*p.h,vx:(Math.random()-.5)*3,vy:-Math.random()*2,life:1,decay:.006+Math.random()*.012,size:2+Math.random()*5,color:"#0f0",g:.04,dissolve:true});}}function triggerMiss(){gameState="missAnim";missTimer=0;ball.visible=false;paddleL.dissolving=true;const ex=Math.max(ball.x,ball.r),ey=ball.y;spawnExplosion(ex,ey,35);spawnExplosion(ex,ey,12);spawnDissolve(paddleL);scoreR++;}function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}}function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}ctx.globalAlpha=1;}function update(){if(gameState==="missAnim"){updateParticles();missTimer++;if(missTimer>=MISS_FRAMES){resetBall();gameState="playing";particles=[];}return;}if(keys.ArrowUp)paddleL.y=Math.max(0,paddleL.y-paddleL.speed);if(keys.ArrowDown)paddleL.y=Math.min(canvas.height-paddleL.h,paddleL.y+paddleL.speed);const cy=paddleR.y+paddleR.h/2;if(cy<ball.y-10)paddleR.y=Math.min(canvas.height-paddleR.h,paddleR.y+paddleR.speed);else if(cy>ball.y+10)paddleR.y=Math.max(0,paddleR.y-paddleR.speed);ball.x+=ball.dx;ball.y+=ball.dy;if(ball.y-ball.r<=0||ball.y+ball.r>=canvas.height)ball.dy*=-1;if(ball.dx<0&&ball.x-ball.r<=paddleL.x+paddleL.w&&ball.y>paddleL.y&&ball.y<paddleL.y+paddleL.h){ball.dx=Math.abs(ball.dx)*1.05;ball.x=paddleL.x+paddleL.w+ball.r;}if(ball.dx>0&&ball.x+ball.r>=paddleR.x&&ball.y>paddleR.y&&ball.y<paddleR.y+paddleR.h){ball.dx=-Math.abs(ball.dx)*1.05;ball.x=paddleR.x-ball.r;}if(ball.x<0){triggerMiss();return;}if(ball.x>canvas.width){scoreL++;resetBall();}}function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#0f0";ctx.setLineDash([5,15]);ctx.beginPath();ctx.moveTo(320,0);ctx.lineTo(320,480);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="#0f0";if(!paddleL.dissolving)ctx.fillRect(paddleL.x,paddleL.y,paddleL.w,paddleL.h);ctx.fillRect(paddleR.x,paddleR.y,paddleR.w,paddleR.h);if(ball.visible){ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();}drawParticles();ctx.font="16px monospace";ctx.fillText(scoreL+" - "+scoreR,300,30);}function loop(){update();draw();requestAnimationFrame(loop);}document.addEventListener("keydown",e=>{keys[e.code]=true;if(["ArrowUp","ArrowDown","KeyR"].includes(e.code))e.preventDefault();if(e.code==="KeyR")init();});document.addEventListener("keyup",e=>keys[e.code]=false);init();loop();</script></body></html>
